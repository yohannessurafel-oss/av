<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AVMF CBS v2.0 — Dashboard</title>
<link rel="stylesheet" href="style2.css"/>
<style>
  .module-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
    padding: 20px;
  }
  .module-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 20px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: var(--shadow-sm);
  }
  .module-card:hover {
    transform: translateY(-4px);
    box-shadow: var(--shadow-md);
    border-color: var(--navy-600);
  }
  .sidebar-category {
    padding: 8px 12px;
    margin: 2px 8px;
    border-radius: 4px;
    cursor: pointer;
  }
  .sidebar-category.active {
    background: var(--navy-800);
    color: white;
  }
</style>
</head>
<body>

<div class="window-container">
  <div class="title-bar">
    <div class="title-branding-block">
      <svg class="header-logo-svg" viewBox="0 0 100 100" width="42" height="42">...</svg>
      <div class="title-text-block">
        <span class="title-main">Africa Village Microfinance</span>
        <span class="title-sub">Core Banking System v2.0</span>
      </div>
    </div>
    <div class="title-meta">
      <span id="systemDate" class="title-date"></span>
      <span class="title-user">👤 Operator</span>
    </div>
  </div>

  <div class="workspace">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-header">📂 All Modules</div>
      <div id="sidebarFilters" class="nav-menu"></div>
      <div class="sidebar-footer-brand">AVMF CBS v2.0</div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
      <div class="context-badge-bar">
        <span class="badge-icon">🏠</span>
        Central Dashboard — Select a Module
      </div>

      <!-- Top Tabs -->
      <div class="tab-bar" id="tabBar"></div>

      <input type="text" id="moduleSearch" placeholder="🔍 Search modules..." style="width:96%; margin:12px 20px; padding:10px; border-radius:4px;">

      <div class="module-grid" id="moduleGrid"></div>
    </div>
  </div>
</div>

<script>
// All Modules with real paths where available
const modules = [
  {name: "00 Client Master Registry", icon: "👤", path: "client-maintenance.html", cat: "operations"},
  {name: "01 Loan Application", icon: "📋", path: "loan-application.html", cat: "operations"},
  {name: "02 Center Loan Application", icon: "👥", path: "#", cat: "operations"},
  {name: "03 Loan Appraisal Management", icon: "🔎", path: "#", cat: "operations"},
  {name: "04 Credit Sanction Console", icon: "✅", path: "#", cat: "operations"},
  {name: "05 Loan Account Maintenance", icon: "🏦", path: "loan-account-maintenance.html", cat: "operations"},
  {name: "06 Collateral Inventory Risk", icon: "🏠", path: "#", cat: "risk"},
  {name: "07 Guarantor Asset Registry", icon: "🤝", path: "#", cat: "risk"},
  {name: "08 Teller Cash Vault Control", icon: "🗄️", path: "#", cat: "teller"},
  {name: "09 Settlement Early Payoff", icon: "💸", path: "#", cat: "financials"},
  {name: "10 Loan Disbursement", icon: "📤", path: "#", cat: "operations"},
  {name: "11 Loan Ledger Report", icon: "📊", path: "#", cat: "reports"},
  {name: "12 General Ledger", icon: "📒", path: "general-ledger.html", cat: "financials"},
  {name: "12 Client Financial Account Maintenance", icon: "💳", path: "account-maintenance.html", cat: "financials"}
];

const categories = [
  {label: "All Modules", filter: "all", icon: "🌐"},
  {label: "Credit Operations", filter: "operations", icon: "📋"},
  {label: "Financials & Ledger", filter: "financials", icon: "💰"},
  {label: "Risk & Collateral", filter: "risk", icon: "🛡️"},
  {label: "Teller & Cash", filter: "teller", icon: "🏧"},
  {label: "Reports", filter: "reports", icon: "📊"}
];

let currentFilter = "all";

function renderSidebar() {
  const container = document.getElementById('sidebarFilters');
  container.innerHTML = categories.map(c => `
    <div class="sidebar-category ${c.filter === currentFilter ? 'active' : ''}" onclick="setFilter('${c.filter}')">
      ${c.icon} ${c.label}
    </div>
  `).join('');
}

function setFilter(filter) {
  currentFilter = filter;
  renderSidebar();
  renderModules();
}

function renderModules() {
  let filtered = modules;
  if (currentFilter !== "all") {
    filtered = filtered.filter(m => m.cat === currentFilter);
  }
  const term = document.getElementById('moduleSearch').value.toLowerCase();
  if (term) filtered = filtered.filter(m => m.name.toLowerCase().includes(term));

  const grid = document.getElementById('moduleGrid');
  grid.innerHTML = filtered.map(m => `
    <div class="module-card" onclick="window.location.href='${m.path}'">
      <div style="font-size:42px;margin-bottom:10px;">${m.icon}</div>
      <strong>${m.name}</strong>
    </div>
  `).join('');
}

// Search
document.getElementById('moduleSearch').addEventListener('input', renderModules);

// System Date
document.getElementById('systemDate').textContent = new Date().toLocaleDateString('en-ET', {
  weekday: 'short', year: 'numeric', month: 'short', day: 'numeric'
});

// Init
renderSidebar();
renderModules();
</script>
</body>
</html>
