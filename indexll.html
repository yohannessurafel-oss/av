<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AVMF CBS v2.0 — Dashboard</title>
<link rel="stylesheet" href="style2.css"/>
<style>
  .tab-bar {
    display: flex; gap: 2px; border-bottom: 3px solid #0d3460; margin: 10px 20px 0;
  }
  .tab {
    padding: 10px 20px; font-weight: 600; cursor: pointer; border-radius: 4px 4px 0 0;
    background: #f1f5f9; border: 1px solid #e2e8f0; border-bottom: none;
  }
  .tab.active {
    background: #0d3460; color: white; border-color: #0d3460;
  }
  .module-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px;
    padding: 20px;
  }
  .module-card {
    background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px;
    padding: 18px; transition: all 0.2s; cursor: pointer;
  }
  .module-card:hover {
    transform: translateY(-3px); box-shadow: 0 8px 25px rgba(13,52,96,0.15);
    border-color: #0d3460;
  }
</style>
</head>
<body>

<div class="window-container">
  <div class="title-bar">... (same branding) ...</div>

  <div class="workspace">
    <!-- Sidebar (unchanged) -->
    <div class="sidebar">... full module list ...</div>

    <div class="main-content">
      <div class="context-badge-bar">
        <span class="badge-icon">🏦</span>
        AVMF Core Banking System — Unified Dashboard
      </div>

      <!-- Tabbed Navigation -->
      <div class="tab-bar" id="tabBar"></div>

      <input type="text" id="moduleSearch" placeholder="🔍 Search modules..." 
             style="width:96%; margin:15px 20px; padding:10px; border-radius:6px; font-size:15px;">

      <div class="module-grid" id="moduleGrid"></div>
    </div>
  </div>
</div>

<script>
// Modules with categories for tabs
const allModules = [
  { name: "Client Master Registry", icon: "👤", path: "client-maintenance.html", category: "operations" },
  { name: "Loan Application", icon: "📋", path: "loan-application.html", category: "operations" },
  { name: "Loan Appraisal", icon: "🔎", path: "#", category: "operations" },
  { name: "Credit Sanction Console", icon: "✅", path: "#", category: "operations" },
  { name: "Loan Account Maintenance", icon: "🏦", path: "loan-account-maintenance.html", category: "operations" },
  { name: "Client Financial Accounts", icon: "💳", path: "account-maintenance.html", category: "financials" },
  { name: "General Ledger", icon: "📒", path: "general-ledger.html", category: "financials" },
  { name: "Collateral Registry", icon: "🏠", path: "#", category: "risk" },
  { name: "Guarantor Registry", icon: "🤝", path: "#", category: "risk" },
  { name: "Teller Cash Vault", icon: "🗄️", path: "#", category: "teller" },
  { name: "Loan Disbursement", icon: "📤", path: "#", category: "operations" },
  { name: "Settlement & Payoff", icon: "💸", path: "#", category: "financials" },
  { name: "Loan Ledger Report", icon: "📊", path: "#", category: "reports" },
];

const tabs = [
  { label: "All Modules", filter: "all" },
  { label: "Credit Operations", filter: "operations" },
  { label: "Financials & Ledger", filter: "financials" },
  { label: "Risk & Collateral", filter: "risk" },
  { label: "Teller & Cash", filter: "teller" },
  { label: "Reports", filter: "reports" }
];

let currentFilter = "all";

function renderTabs() {
  const bar = document.getElementById('tabBar');
  bar.innerHTML = tabs.map(tab => `
    <div class="tab ${tab.filter === currentFilter ? 'active' : ''}" 
         onclick="switchTab('${tab.filter}')">${tab.label}</div>
  `).join('');
}

function switchTab(filter) {
  currentFilter = filter;
  renderTabs();
  renderModules();
}

function renderModules() {
  let filtered = allModules;
  if (currentFilter !== "all") {
    filtered = allModules.filter(m => m.category === currentFilter);
  }
  // Apply search if any
  const searchTerm = document.getElementById('moduleSearch').value.toLowerCase();
  if (searchTerm) {
    filtered = filtered.filter(m => m.name.toLowerCase().includes(searchTerm));
  }

  const grid = document.getElementById('moduleGrid');
  grid.innerHTML = filtered.map(m => `
    <div class="module-card" onclick="window.open('${m.path}', '_self')">
      <div style="font-size:36px;margin-bottom:8px;">${m.icon}</div>
      <strong>${m.name}</strong>
    </div>
  `).join('');
}

// Search handler
document.getElementById('moduleSearch').addEventListener('input', renderModules);

// Init
renderTabs();
renderModules();
</script>
</body>
</html>
