<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Africa Village | Admin Dashboard</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.19.3/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>

    <style>
        :root { 
            --primary: #2563eb; 
            --bg: #f8fafc; 
            --card-bg: #ffffff;
            --text-main: #0f172a; 
            --text-muted: #64748b;
            --border: #e2e8f0;
            --radius: 12px;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text-main); 
            margin: 0; 
            padding: 24px; 
        }

        .container { max-width: 1200px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }

        .card { 
            background: var(--card-bg); 
            padding: 24px; 
            border-radius: var(--radius); 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); 
            border: 1px solid var(--border);
        }

        table { width: 100%; border-collapse: collapse; }
        th { padding: 12px; background: #f1f5f9; text-align: left; font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); }
        td { padding: 16px; border-bottom: 1px solid var(--border); font-size: 0.875rem; }

        .status-badge { padding: 4px 12px; border-radius: 9999px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; }
        .pending { background: #fef3c7; color: #92400e; }
        .approved { background: #ecfdf5; color: #065f46; }
        .rejected { background: #fef2f2; color: #991b1b; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.75); backdrop-filter: blur(4px); z-index: 100; overflow-y: auto; padding: 20px; }
        .modal-content { background: white; max-width: 900px; margin: 20px auto; padding: 32px; border-radius: var(--radius); position: relative; }
        
        .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 24px; margin-top: 20px; }
        .info-group h4 { margin: 0 0 12px 0; color: var(--primary); border-bottom: 1px solid var(--border); padding-bottom: 5px; }
        .info-item { font-size: 0.85rem; margin-bottom: 6px; }
        .info-item span { font-weight: 600; color: var(--text-muted); margin-right: 5px; }

        .doc-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; margin-top: 24px; }
        .doc-item { border: 1px solid var(--border); padding: 12px; border-radius: 8px; background: #fff; }
        .img-container { background: #000; height: 140px; border-radius: 4px; display: flex; align-items: center; justify-content: center; overflow: hidden; margin-bottom: 10px; }
        .doc-item img { max-width: 100%; max-height: 100%; object-fit: contain; }

        .btn { padding: 8px 16px; border-radius: 6px; cursor: pointer; border: none; font-weight: 600; transition: 0.2s; }
        .btn-view { background: var(--primary); color: white; }
        .btn-download { display: block; text-align: center; text-decoration: none; background: #f1f5f9; color: var(--text-main); font-size: 0.75rem; padding: 8px; border-radius: 4px; border: 1px solid var(--border); }
        .btn-download:hover { background: var(--primary); color: white; }
        
        .close-modal { position: absolute; right: 24px; top: 24px; cursor: pointer; font-size: 1.5rem; color: var(--text-muted); }



@media print {
    body * { visibility: hidden; }
    #detailsModal, #detailsModal * { visibility: visible; }
    #detailsModal { 
        position: absolute; 
        left: 0; 
        top: 0; 
        width: 100%; 
        box-shadow: none; 
    }
    .btn, .close-modal, #rejectionReason { display: none !important; }
    .modal { position: relative; display: block; background: white; }
    .img-container { height: auto !important; border: 1px solid #eee; }
}
        
@media print {
    /* Hide everything on the page */
    body * {
        visibility: hidden;
    }
    /* Show only the modal content */
    #detailsModal, #detailsModal * {
        visibility: visible;
    }
    #detailsModal {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        background: white;
    }
    /* Fix images for print */
    .img-container {
        height: auto !important;
        border: none !important;
    }
    .doc-item img {
        max-width: 300px;
        height: auto;
    }
}

.img-container { 
    background: #f1f5f9; /* Light grey instead of black */
    height: 140px; 
    border-radius: 4px; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    overflow: hidden; 
    margin-bottom: 10px;
    border: 1px solid var(--border);
}

.doc-item img { 
    width: 100%; 
    height: 100%; 
    object-fit: cover; /* This fills the box better than 'contain' */
}

        
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Loan Applications</h1>
        <button onclick="fetchApplications()" class="btn btn-view">Refresh List</button>
    </div>
  <button onclick="handleLogout()" class="btn" style="background: #64748b; color: white;">Logout</button>


    <div class="header">
    <h1>Loan Applications</h1>
    <div style="display: flex; gap: 10px;">
        <button onclick="exportToExcel()" class="btn" style="background: #16a34a; color: white;">
    Export to Excel
</button>
        <button onclick="fetchApplications()" class="btn btn-view">Refresh List</button>
    </div>
</div>

    <div class="card">
        <table>
            <thead>
                <tr>
                    <th>Applicant</th>
                    <th>Amount (ETB)</th>
                    <th>Duration</th>
                    <th>Repayable</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="appTableBody">
                <tr><td colspan="6" style="text-align:center">Loading...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<div id="detailsModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="margin:0">Review Application</h2>
            <button onclick="downloadReview()" class="btn" style="background: #ef4444; color: white;">Download PDF</button>
        </div>

        <div id="modalDetails" class="info-grid"></div>
        
        <h3 style="margin-top:32px">Submitted Documents</h3>
        <div class="doc-grid" id="modalDocs"></div>

        <div id="approvalSection" style="margin-top: 30px; padding: 20px; background: #f8fafc; border-radius: 8px; border: 1px solid var(--border);">
            <h3 style="margin-top:0">Multi-Admin Review</h3>
            <div style="display: flex; gap: 20px; align-items: center; margin-bottom: 20px;">
                <button id="btnAdmin1" class="btn" style="background: #2563eb; color: white;">Admin 1: Approve</button>
                <div style="font-size: 1.5rem; color: var(--border);">→</div>
                <button id="btnAdmin2" class="btn" style="background: #2563eb; color: white;">Admin 2: Approve</button>
            </div>
            <div style="border-top: 1px solid var(--border); padding-top: 20px;">
                <label style="font-size: 0.8rem; font-weight: bold; color: var(--text-muted);">Rejection Notes:</label>
                <textarea id="rejectionReason" style="width: 100%; margin: 8px 0; padding: 10px; border-radius: 6px; border: 1px solid var(--border);" placeholder="Reason for rejection..."></textarea>
                <button id="btnReject" class="btn" style="background: #dc2626; color: white; width: 100%;">Reject Application</button>
            </div>
            <div id="finalStatus" style="margin-top: 15px; font-weight: bold;"></div>
        </div>
    </div>
</div>



            
        </div>
        
        <h3 style="margin-top:32px">Submitted Documents</h3>
        <div class="doc-grid" id="modalDocs"></div>
    </div>
</div>

<script>
    // 1. GLOBAL VARIABLES
    let currentApplications = [];
    let loggedInAdmin = null;

    // 2. INITIALIZATION
    async function initializeDashboard() {
        const { data: { user }, error: authError } = await _supabase.auth.getUser();

        if (authError || !user) {
            window.location.href = "login.html"; 
            return;
        }

        const { data: profile, error: profileError } = await _supabase
            .from('profiles')
            .select('role, assigned_branch')
            .eq('id', user.id)
            .single();

        if (profileError) {
            console.error("Profile not found:", profileError);
            return;
        }

        loggedInAdmin = profile;
        fetchApplications();
    }

    // 3. FETCH DATA
    async function fetchApplications() {
        if (!loggedInAdmin) return;
        let query = _supabase.from('loan_applications').select('*');

        if (loggedInAdmin.role === 'admin1' && loggedInAdmin.assigned_branch) {
            query = query.eq('nearby_branch', loggedInAdmin.assigned_branch);
        }

        const { data, error } = await query.order('created_at', { ascending: false });
        if (error) return alert("Error fetching loans: " + error.message);

        currentApplications = data;
        renderTable();
    }

    // 4. RENDER TABLE
    function renderTable() {
        const tbody = document.getElementById('appTableBody');
        tbody.innerHTML = currentApplications.length ? currentApplications.map((app, i) => `
            <tr>
                <td><strong>${app.first_name} ${app.father_name}</strong><br><small>${app.nearby_branch || 'General'}</small></td>
                <td>${Number(app.loan_amount).toLocaleString()}</td>
                <td>${app.loan_duration} Days</td>
                <td>${Number(app.total_repayable).toLocaleString()}</td>
                <td><span class="status-badge ${app.status}">${app.status}</span></td>
                <td><button onclick="viewDetails(${i})" class="btn btn-view">Review</button></td>
            </tr>
        `).join('') : '<tr><td colspan="6" style="text-align:center">No records found.</td></tr>';
    }

    // 5. EXPORT TO EXCEL
    function exportToExcel() {
        if (typeof XLSX === 'undefined') {
            alert("Excel library is not loaded. Please wait a moment or check your connection.");
            return;
        }

        if (currentApplications.length === 0) {
            alert("No data available to export.");
            return;
        }

        const excelData = currentApplications.map(app => ({
            'Application Date': new Date(app.created_at).toLocaleDateString(),
            'Status': app.status.toUpperCase(),
            'First Name': app.first_name,
            'Father Name': app.father_name,
            'Grandfather Name': app.grandfather_name,
            'Mother Name': app.mother_name,
            'Gender': app.gender,
            'Phone Number': app.phone_number,
            'Loan Amount (ETB)': app.loan_amount,
            'Duration (Days)': app.loan_duration,
            'Total Repayable': app.total_repayable,
            'Nearby Branch': app.nearby_branch,
            'Organization': app.org_name,
            'Net Salary': app.net_salary,
            'National ID Num': app.national_id_number,
            'Admin 1 Status': app.admin_one_status,
            'Admin 2 Status': app.admin_two_status
        }));

        const worksheet = XLSX.utils.json_to_sheet(excelData);
        const workbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(workbook, worksheet, "Loan Applications");

        const fileName = `Africa_Village_Loans_${new Date().toISOString().split('T')[0]}.xlsx`;
        XLSX.writeFile(workbook, fileName);
    }

    // 6. VIEW DETAILS (MODAL POPULATION)
    async function viewDetails(index) {
    const app = currentApplications[index];
    const detailsContainer = document.getElementById('modalDetails');
    const docsContainer = document.getElementById('modalDocs');

    // 1. Map all personal, address, and guarantor info
    detailsContainer.innerHTML = `
        <div class="info-group">
            <h4>Applicant Information</h4>
            <div class="info-item"><span>Full Name:</span> ${app.first_name} ${app.father_name} ${app.grandfather_name}</div>
            <div class="info-item"><span>Mother's Name:</span> ${app.mother_name}</div>
            <div class="info-item"><span>Phone:</span> ${app.phone_number}</div>
            <div class="info-item"><span>Birthday:</span> ${app.birthday}</div>
            <div class="info-item"><span>Gender:</span> ${app.gender}</div>
        </div>
        <div class="info-group">
            <h4>Residential Address</h4>
            <div class="info-item"><span>Region/City:</span> ${app.res_region || 'N/A'}, ${app.res_city || 'N/A'}</div>
            <div class="info-item"><span>Sub-City/Woreda:</span> ${app.res_sub_city || 'N/A'} / ${app.res_woreda || 'N/A'}</div>
            <div class="info-item"><span>House No:</span> ${app.res_house_num || 'N/A'}</div>
            <div class="info-item"><span>Nearby Branch:</span> ${app.nearby_branch}</div>
        </div>
        <div class="info-group">
            <h4>Guarantor Information</h4>
            <div class="info-item"><span>Guarantor Name:</span> ${app.guarantor_name || 'N/A'}</div>
            <div class="info-item"><span>Guarantor Phone:</span> ${app.guarantor_phone || 'N/A'}</div>
            <div class="info-item"><span>Guarantor Address:</span> ${app.guarantor_address || 'N/A'}</div>
        </div>
        <div class="info-group">
            <h4>Financial Details</h4>
            <div class="info-item"><span>Loan Amount:</span> ${Number(app.loan_amount).toLocaleString()} ETB</div>
            <div class="info-item"><span>Repayable:</span> ${Number(app.total_repayable).toLocaleString()} ETB</div>
            <div class="info-item"><span>Organization:</span> ${app.org_name}</div>
            <div class="info-item"><span>Net Salary:</span> ${Number(app.net_salary).toLocaleString()} ETB</div>
        </div>
    `;

    // 2. Map all 7 documents
    const docFields = [
        { name: "National ID Front", path: app.nat_id_front },
        { name: "National ID Back", path: app.nat_id_back },
        { name: "Employee ID Front", path: app.emp_id_front },
        { name: "Employee ID Back", path: app.emp_id_back },
        { name: "Employment Letter", path: app.employment_letter },
        { name: "Personal Photo", path: app.personal_photo },
        { name: "Digital Signature", path: app.digital_signature }
    ];

    docsContainer.innerHTML = docFields.map(doc => {
        if (!doc.path) return '';
        const url = _supabase.storage.from('kyc-docs').getPublicUrl(doc.path).data.publicUrl;
        return `
            <div class="doc-item">
                <div class="img-container">
                    <img src="${url}" alt="${doc.name}" onclick="window.open('${url}', '_blank')">
                </div>
                <div style="font-size:0.75rem; font-weight:bold; text-align:center">${doc.name}</div>
                <a href="${url}" target="_blank" class="btn-download" style="margin-top:5px">View Full Size</a>
            </div>
        `;
    }).join('');

    // 3. Setup Admin UI (Button states)
    setupAdminUI(app);
    
    document.getElementById('detailsModal').style.display = 'block';
}

    // 7. APPROVAL LOGIC
    async function approveStep(id, adminNumber) {
        const updateData = {};
        const column = adminNumber === 1 ? 'admin_one_status' : 'admin_two_status';
        updateData[column] = 'approved';

        const app = currentApplications.find(a => a.id === id);
        const otherAdminApproved = (adminNumber === 1 ? app.admin_two_status : app.admin_one_status) === 'approved';
        
        if (otherAdminApproved) updateData.status = 'approved';

        const { error } = await _supabase.from('loan_applications').update(updateData).eq('id', id);
        if (error) alert(error.message);
        else {
            alert(`Admin ${adminNumber} Approval Recorded!`);
            closeModal();
            fetchApplications();
        }
    }

    async function rejectStep(id) {
        const reason = document.getElementById('rejectionReason').value;
        if (!reason) return alert("Please provide a reason.");
        const { error } = await _supabase.from('loan_applications').update({ status: 'rejected', rejection_reason: reason }).eq('id', id);
        if (error) alert(error.message);
        else {
            alert("Rejected.");
            closeModal();
            fetchApplications();
        }
    }

    // Fixed Approval UI logic
function updateApprovalUI(app) {
    const b1 = document.getElementById('btnAdmin1');
    const b2 = document.getElementById('btnAdmin2');
    const bReject = document.getElementById('btnReject');
    const statusDiv = document.getElementById('finalStatus');

    // Safety check: if buttons are missing, stop here
    if (!b1 || !b2 || !bReject) {
        console.error("Approval buttons not found in HTML!");
        return;
    }

    // Reset states
    b1.disabled = false; b2.disabled = false; bReject.disabled = false;
    b1.style.opacity = "1"; b2.style.opacity = "1";
    b1.innerText = "Admin 1: Approve";
    b2.innerText = "Admin 2: Approve";
    b1.style.background = "#2563eb";
    b2.style.background = "#2563eb";

    // Admin 1 restriction
    if (loggedInAdmin.role === 'admin1') {
        b2.disabled = true;
        b2.style.opacity = "0.5";
        b2.innerText = "Waiting for Super Admin";
    }

    // Update based on database status
    if (app.admin_one_status === 'approved') {
        b1.disabled = true;
        b1.innerText = "Admin 1: ✅ Approved";
        b1.style.background = "#16a34a";
    }

    if (app.admin_two_status === 'approved') {
        b2.disabled = true;
        b2.innerText = "Admin 2: ✅ Approved";
        b2.style.background = "#16a34a";
    }

    if (app.status === 'rejected') {
        statusDiv.innerHTML = `<span class="status-badge rejected">REJECTED: ${app.rejection_reason || ''}</span>`;
    }

    b1.onclick = () => approveStep(app.id, 1);
    b2.onclick = () => approveStep(app.id, 2);
    bReject.onclick = () => rejectStep(app.id);
}

    function closeModal() { document.getElementById('detailsModal').style.display = "none"; }
    async function handleLogout() {
        await _supabase.auth.signOut();
        window.location.href = "login.html";
    }
function downloadReview() {
    window.print();
    // 1. Get the applicant's name for the filename
    const name = document.querySelector("#modalDetails .info-item:first-child").innerText || "Application";
    
    // 2. Temporarily hide the approval buttons and close icon so they don't show in the PDF
    const approvalSection = document.getElementById('approvalSection');
    const closeBtn = document.querySelector('.close-modal');
    const downloadBtn = event.target;
    
    approvalSection.style.display = 'none';
    closeBtn.style.display = 'none';
    downloadBtn.style.display = 'none';

    // 3. Trigger Print
    window.print();

    // 4. Show them again after printing
    approvalSection.style.display = 'block';
    closeBtn.style.display = 'block';
    downloadBtn.style.display = 'block';
}
    initializeDashboard();
</script>
</body>
</html>
