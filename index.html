<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Africa Village Loan Form | የብድር መጠየቂያ</title>
    <style>
        :root { 
            --primary: #0156D3; 
            --primary-hover: #0044a8;
            --accent: #FFB200;
            --bg: #f4f7fa; 
            --card-bg: #ffffff;
            --text-main: #1a202c; 
            --text-muted: #718096;
            --border: #cbd5e0; 
            --radius: 10px;
            --shadow: 0 10px 25px rgba(0, 86, 211, 0.1);
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg); 
            color: var(--text-main); 
            margin: 0; 
            padding: 40px 20px; 
            display: flex; 
            justify-content: center; 
            align-items: flex-start;
        }

        .form-container { 
            background: var(--card-bg); 
            width: 100%; 
            max-width: 850px; 
            border-radius: var(--radius); 
            box-shadow: var(--shadow); 
            overflow: hidden;
            border-top: 6px solid var(--primary);
        }

        .form-header {
            background: #fff;
            padding: 30px 20px;
            border-bottom: 1px solid #edf2f7;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            text-align: center;
            gap: 15px;
        }

        .logo-container img {
            height: 60px;
            width: auto;
            display: block;
        }

        .header-text h2 { 
            margin: 0; 
            color: var(--primary); 
            font-size: 1.6rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .header-text p {
            margin: 5px 0 0;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 600;
        }

        form { padding: 40px; }

        .section-title { 
            font-size: 0.85rem; 
            font-weight: 800; 
            color: var(--primary); 
            margin: 40px 0 20px 0; 
            text-transform: uppercase; 
            display: flex; 
            align-items: center; 
            letter-spacing: 1px;
        }

        .section-title:first-child { margin-top: 0; }

        .section-title::after { 
            content: ""; 
            height: 2px; 
            background: #e2e8f0; 
            flex-grow: 1; 
            margin-left: 15px; 
        }

        .form-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 20px; 
        }

        .form-group { display: flex; flex-direction: column; }
        .full-width { grid-column: 1 / -1; }

        label { 
            margin-bottom: 8px; 
            font-size: 0.85rem; 
            font-weight: 600; 
            color: #4a5568; 
        }

        input, select { 
            padding: 12px 15px; 
            border: 1px solid var(--border); 
            border-radius: 6px; 
            font-size: 0.95rem; 
            transition: all 0.2s; 
            background: #fff;
        }

        input:focus, select:focus { 
            outline: none; 
            border-color: var(--primary); 
            box-shadow: 0 0 0 3px rgba(1, 86, 211, 0.1);
        }

        .btn-submit { 
            margin-top: 40px; 
            padding: 18px; 
            width: 100%; 
            background-color: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-weight: 700; 
            font-size: 1.1rem;
            cursor: pointer; 
            transition: transform 0.1s, background 0.2s;
        }

        .btn-submit:hover { 
            background-color: var(--primary-hover); 
            transform: translateY(-1px);
        }

        .net-amount { color: var(--primary); font-size: 1.4rem; font-weight: 800; }

        @media (max-width: 600px) { 
            .form-grid { grid-template-columns: 1fr; }
            form { padding: 20px; }
        }
    </style>
</head>
<body>

<div class="form-container">
    <div class="form-header">
        <div class="logo-container">
            <img src="logo.png" alt="Africa Village Logo">
        </div>
        <div class="header-text">
            <h2>Loan Registration Form</h2>
            <p>Africa Village Microfinance | የብድር መጠየቂያ ቅጽ</p>
        </div>
    </div>

    <form id="loanForm">
        <div class="section-title">Personal Information</div>
        <div class="form-grid">
            <div class="form-group"><label>First Name</label><input type="text" id="firstName" required></div>
            <div class="form-group"><label>Father's Name</label><input type="text" id="fatherName" required></div>
            <div class="form-group"><label>Grandfather's Name</label><input type="text" id="grandFatherName" required></div>
            <div class="form-group"><label>Mother's Name</label><input type="text" id="motherName" required></div>
            <div class="form-group">
                <label>Gender</label>
                <select id="gender" required>
                    <option value="">Select Gender</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                </select>
            </div>
            <div class="form-group"><label>Birthday</label><input type="date" id="birthday" required></div>
            <div class="form-group"><label>Nationality</label><input type="text" id="nationality" required></div>
            <div class="form-group"><label>Active Phone Number</label><input type="tel" id="phoneNumber" required></div>
            <div class="form-group"><label>Alternative Phone</label><input type="tel" id="phoneNumber2"></div>
        </div>

        <div class="section-title">Residential Address</div>
        <div class="form-grid">
            <div class="form-group"><label>Region</label><input type="text" id="resRegion" required></div>
            <div class="form-group"><label>City</label><input type="text" id="resCity" required></div>
            <div class="form-group"><label>Sub City</label><input type="text" id="resSubCity" required></div>
            <div class="form-group"><label>Woreda</label><input type="text" id="resWoreda" required></div>
            <div class="form-group"><label>House Number</label><input type="text" id="resHouseNum" required></div>
            <div class="form-group">
                <label>Nearby Branch</label>
                <select id="nearbyBranch" required>
                    <option value="">-- Select Your Nearest Branch --</option>
                    <option value="adama">Adama</option>
                    <option value="Batu">Batu</option>
                    <option value="Bishoftu1">Bishoftu1</option>
                    <option value="Bishoftu2">Bishoftu2</option>
                    <option value="Burayou">Burayou</option>
                    <option value="Butajira">Butajira</option>
                    <option value="Dirediwa">Dirediwa</option>
                    <option value="Djibruk">Djibruk</option>
                    <option value="Dukem">Dukem</option>
                    <option value="Ejire">Ejire</option>
                    <option value="Furi">Furi</option>
                    <option value="Gimbichu">Gimbichu</option>
                    <option value="hana">Hanamariam</option>
                    <option value="HeadOf">Head Office</option>
                    <option value="Holta">Holta</option>
                    <option value="Kality">Kality</option>
                    <option value="kazanchis">Kazanchis</option>
                    <option value="Kirkos">Kirkos</option>
                    <option value="Kolfe">Kolfe</option>
                    <option value="Main(Agona)">Main (Agona)</option>
                    <option value="Mekele">Mekele</option>
                    <option value="Meki">Meki</option>
                    <option value="Modjo">Modjo</option>
                    <option value="Sendafa">Sendafa</option>
                    <option value="Sheno">Sheno</option>
                </select>
            </div>
        </div>

        <div class="section-title">Guarantor Information</div>
        <div class="form-grid">
            <div class="form-group"><label>Full Name</label><input type="text" id="gfname" required></div>
            <div class="form-group"><label>Guarantor's Address</label><input type="text" id="gadress" required></div>
            <div class="form-group"><label>Phone Number</label><input type="tel" id="gphone" required></div>
            <div class="form-group"><label>Guarantor National ID Number</label><input type="text" id="gIDNum" required></div>
            <div class="form-group"><label>Guarantor Gross Salary (ETB)</label><input type="number" id="gGross" required></div>
            <div class="form-group"><label>Guarantor Letter</label><input type="file" id="gLetter" accept="image/*,application/pdf" required></div>
        </div>

        <div class="section-title">Guarantor Documents</div>
        <div class="form-grid">
            <div class="form-group"><label>Guarantor National ID Front</label><input type="file" id="gnatIdFront" accept="image/*" required></div>
            <div class="form-group"><label>Guarantor National ID Back</label><input type="file" id="gnatIdBack" accept="image/*" required></div>
            <div class="form-group"><label>Guarantor Employee ID Front</label><input type="file" id="gempIdFront" accept="image/*" required></div>
            <div class="form-group"><label>Guarantor Employee ID Back</label><input type="file" id="gempIdBack" accept="image/*" required
