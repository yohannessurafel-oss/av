<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Center Group Loan Application</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="window-container">
    <div class="title-bar">
        <div class="title-text">📁 Center Group Loan Application</div>
        <div class="window-controls">
            <span>➖</span>
            <span>🗖</span>
            <span>❌</span>
        </div>
    </div>

    <div class="workspace">
        
        <div class="sidebar">
            <h3>DataEntry</h3>
        </div>

        <div class="main-content">
            <form id="groupLoanForm">
                
                <div class="form-section group-section">
                    
                    <div class="form-row">
                        <label>Branch ID</label>
                        <div class="input-group width-small">
                            <input type="text" value="1001" readonly>
                            <span class="search-btn">🔍</span>
                        </div>
                        <input type="text" class="width-large" value="HEAD OFFICE" readonly>
                    </div>
                    
                    <div class="form-row">
                        <label>Group ID</label>
                        <div class="input-group width-large">
                            <input type="text" id="groupIdInput" value="GRP-WEST-01">
                            <span class="search-btn">🔍</span>
                        </div>
                    </div>

                    <div class="form-row">
                        <label>Sub Group ID</label>
                        <div class="input-group width-large">
                            <input type="text" id="subGroupIdInput" value="WEST-01A">
                            <span class="search-btn">🔍</span>
                        </div>
                    </div>

                    <div class="form-row split-row">
                        <div class="flex-item">
                            <label>Application ID</label>
                            <div class="input-group width-small">
                                <input type="text" value="APP-14092014-001" readonly>
                                <span class="search-btn">🔍</span>
                            </div>
                        </div>
                        <div class="flex-item date-container">
                            <label>Date</label>
                            <input type="text" value="14/Sep/2014" class="width-small" readonly>
                            <select class="dropdown-arrow-btn"><option></option></select>
                        </div>
                    </div>

                    <div class="divider"></div>

                    <div class="form-row">
                        <label>Client Branch ID</label>
                        <select class="width-small">
                            <option>1001</option>
                        </select>
                    </div>

                    <div class="form-row split-row">
                        <div class="flex-item">
                            <label>Client ID</label>
                            <div class="input-group width-medium">
                                <input type="text" id="clientIdInput" placeholder="--Search--">
                                <span class="search-btn">🔍</span>
                            </div>
                        </div>
                        <div class="flex-item">
                            <label>Product ID</label>
                            <div class="input-group width-medium">
                                <input type="text" value="BUS-MICRO-LOAN" readonly>
                                <span class="search-btn">🔍</span>
                            </div>
                        </div>
                    </div>

                    <div class="form-row">
                        <label>Main Repayment AccountID</label>
                        <div class="input-group width-large">
                            <input type="text" id="repaymentAccountInput">
                            <span class="search-btn">🔍</span>
                        </div>
                    </div>

                    <div class="form-row">
                        <label>Loan Purpose</label>
                        <select class="width-large muted-text">
                            <option>--OTHER--</option>
                        </select>
                    </div>
                </div>

                <div class="form-section financial-section">
                    <div class="form-row split-row">
                        <div class="flex-item">
                            <label>Officer ID</label>
                            <div class="input-group width-medium">
                                <input type="text" id="officerIdInput">
                                <span class="search-btn">🔍</span>
                            </div>
                        </div>
                        <div class="flex-item">
                            <label>Donor ID</label>
                            <div class="input-group width-medium">
                                <input type="text" id="donorIdInput">
                                <span class="search-btn">🔍</span>
                            </div>
                        </div>
                    </div>

                    <div class="form-row">
                        <label>Loan Purpose</label>
                        <select class="width-large muted-text">
                            <option>--Select--</option>
                        </select>
                    </div>

                    <div class="form-row">
                        <label>Loan Amount</label>
                        <input type="text" class="width-medium text-right" value="1,500,000">
                    </div>

                    <div class="form-row split-row">
                        <div class="flex-item">
                            <label>Term</label>
                            <input type="text" class="width-small text-right" value="18">
                        </div>
                        <div class="flex-item">
                            <label>Currency ID</label>
                            <input type="text" value="KES" class="width-small" readonly>
                        </div>
                    </div>

                    <div class="form-row split-row">
                        <div class="flex-item">
                            <label>Interest Rate</label>
                            <input type="text" class="width-small text-right" value="12.5%">
                        </div>
                        <div class="flex-item">
                            <label>Line Of Business</label>
                            <select class="width-small">
                                <option>Proprietary</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <label>Commission Rate</label>
                        <input type="text" class="width-small">
                    </div>

                    <div class="form-row split-row">
                        <div class="flex-item">
                            <label>Effective Rate</label>
                            <input type="text" class="width-small text-right" value="13.1%">
                        </div>
                        <div class="flex-item">
                            <label>Group Class</label>
                            <select class="width-small">
                                <option>A</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <label>Spread</label>
                        <select class="width-small text-right">
                            <option>2.0%</option>
                        </select>
                    </div>

                    <div class="form-row split-row">
                        <div class="flex-item">
                            <label>Repayment Term</label>
                            <input type="text" class="width-small text-right" value="13.1%">
                        </div>
                        <div class="flex-item">
                            <label>File Number</label>
                            <input type="text" class="width-small">
                        </div>
                    </div>

                    <div class="form-row split-row">
                        <div class="flex-item">
                            <label>Sales Officer</label>
                            <div class="input-group width-medium">
                                <input type="text" id="salesOfficerInput">
                                <span class="search-btn">🔍</span>
                            </div>
                        </div>
                        <div class="flex-item">
                            <label>Loan Period</label>
                            <input type="text" class="width-small">
                        </div>
                    </div>

                </div>

                <div class="form-row central-buttons">
                    <button type="button" class="ctrl-btn">Alter</button>
                    <button type="button" class="ctrl-btn">Update</button>
                    <button type="button" class="ctrl-btn" id="clearBtn">Clear</button>
                </div>

                <div class="grid-section">
                    <table class="data-grid">
                        <thead>
                            <tr>
                                <th style="width: 2%;">[Icon]</th>
                                <th style="width: 8%;">Group ID</th>
                                <th style="width: 8%;">Client ID</th>
                                <th style="width: 15%;">Name</th>
                                <th style="width: 5%;">Loan Cycle No.</th>
                                <th style="width: 5%;">Loan Level No.</th>
                                <th style="width: 10%;">Loan Amount</th>
                                <th style="width: 5%;">Loan Term</th>
                                <th style="width: 5%;">Loan Period</th>
                                <th style="width: 8%;">Repayment Term</th>
                                <th style="width: 8%;">Repayment Frequency</th>
                                <th style="width: 5%;">Interest Rate</th>
                                <th style="width: 5%;">Penalty Rate</th>
                                <th style="width: 11%;">Total Savings Balance</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr class="empty-row">
                                <td colspan="14">No records to display.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </form>
        </div>

        <div class="action-sidebar">
            <button type="button" class="action-btn">More Info</button>
            <button type="button" class="action-btn">Group Detail</button>
            <button type="button" class="action-btn">Image</button>
            <button type="button" class="action-btn"><u>V</u>iew</button>
            <button type="button" class="action-btn"><u>A</u>dd</button>
            <button type="button" class="action-btn" id="gridEditBtn"><u>E</u>dit</button>
            <button type="button" class="action-btn"><u>D</u>elete</button>
            <button type="button" class="action-btn"><u>S</u>ave</button>
            <button type="button" class="action-btn">Done</button>
            <button type="button" class="action-btn">Cancel</button>
        </div>
    </div>

    <div class="footer-bar">
        <span>BRJ.Net Web Banking</span>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
