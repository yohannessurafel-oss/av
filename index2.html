<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Africa Village Loan Form | የብድር መጠየቂያ</title>
    <style>
        :root {
            --primary: #0156D3;
            --primary-hover: #0044a8;
            --accent: #FFB200;
            --bg: #f4f7fa;
            --card-bg: #ffffff;
            --text-main: #1a202c;
            --text-muted: #718096;
            --border: #cbd5e0;
            --radius: 10px;
            --shadow: 0 10px 25px rgba(0, 86, 211, 0.1);
        }
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }
        .form-container {
            background: var(--card-bg);
            width: 100%;
            max-width: 850px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            border-top: 6px solid var(--primary);
        }
        .form-header {
            background: #fff;
            padding: 30px 20px;
            border-bottom: 1px solid #edf2f7;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 15px;
        }
        .logo-container img {
            height: 100px;
            width: auto;
            display: block;
        }
        .header-text h2 {
            margin: 0;
            color: var(--primary);
            font-size: 1.6rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .header-text p {
            margin: 5px 0 0;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 600;
        }
        form { padding: 40px; }
        .section-title {
            font-size: 0.85rem;
            font-weight: 800;
            color: var(--primary);
            margin: 40px 0 20px 0;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            letter-spacing: 1px;
        }
        .section-title:first-child { margin-top: 0; }
        .section-title::after {
            content: "";
            height: 2px;
            background: #e2e8f0;
            flex-grow: 1;
            margin-left: 15px;
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .form-group { display: flex; flex-direction: column; }
        .full-width { grid-column: 1 / -1; }
        label {
            margin-bottom: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #4a5568;
        }
        input, select {
            padding: 12px 15px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.95rem;
            transition: all 0.2s;
            background: #fff;
        }
        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(1, 86, 211, 0.1);
        }
        .btn-submit {
            margin-top: 40px;
            padding: 18px;
            width: 100%;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
        }
        .btn-submit:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }
        .btn-submit:disabled { background-color: #cbd5e0; cursor: not-allowed; }
        .net-amount { color: var(--primary); font-size: 1.4rem; font-weight: 800; }
        
        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; }
            form { padding: 20px; }
        }
    </style>
</head>
<body>
<div class="form-container">
    <div class="form-header">
        <div class="logo-container">
            <img src="logo.png" alt="Africa Village Logo">
        </div>
        <div class="header-text">
            <h2>Loan Registration Form</h2>
            <p>Africa Village Microfinance | የብድር መጠየቂያ ቅጽ</p>
        </div>
    </div>
    
    <form id="loanForm">
        <div class="section-title">Personal Information</div>
        <div class="form-grid">
            <div class="form-group"><label>First Name</label><input type="text" id="firstName" required></div>
            <div class="form-group"><label>Father's Name</label><input type="text" id="fatherName" required></div>
            <div class="form-group"><label>Grandfather's Name</label><input type="text" id="grandFatherName" required></div>
            <div class="form-group"><label>Mother's Name</label><input type="text" id="motherName" required></div>
            <div class="form-group">
                <label>Gender</label>
                <select id="gender" required>
                    <option value="">Select Gender</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                </select>
            </div>
            <div class="form-group"><label>Birthday</label><input type="date" id="birthday" required></div>
            <div class="form-group"><label>Nationality</label><input type="text" id="nationality" required></div>
            <div class="form-group"><label>Active Phone Number</label><input type="tel" id="phoneNumber" required></div>
        </div>

        <div class="section-title">Residential Address</div>
        <div class="form-grid">
            <div class="form-group"><label>Region</label><input type="text" id="resRegion" required></div>
            <div class="form-group"><label>City</label><input type="text" id="resCity" required></div>
            <div class="form-group"><label>Sub City</label><input type="text" id="resSubCity" required></div>
            <div class="form-group"><label>Woreda</label><input type="text" id="resWoreda" required></div>
            <div class="form-group"><label>House Number</label><input type="text" id="resHouseNum" required></div>
            <div class="form-group">
                <label>Nearby Branch</label>
                <select id="nearbyBranch" required>
                    <option value="">-- Select Nearest Branch --</option>
                    <option value="Head Office">Head Office</option>
                    <option value="Adama">Adama</option>
                    <option value="Bishoftu">Bishoftu</option>
                    <option value="Kazanchis">Kazanchis</option>
                    <option value="Kality">Kality</option>
                </select>
            </div>
        </div>

        <div class="section-title">Guarantor Information & Docs</div>
        <div class="form-grid">
            <div class="form-group"><label>Full Name</label><input type="text" id="gfname" required></div>
            <div class="form-group"><label>Phone Number</label><input type="tel" id="gphone" required></div>
            <div class="form-group"><label>Guarantor National ID Front</label><input type="file" id="gnatIdFront" accept="image/*" required></div>
            <div class="form-group"><label>Guarantor National ID Back</label><input type="file" id="gnatIdBack" accept="image/*" required></div>
            <div class="form-group"><label>Guarantor Letter</label><input type="file" id="gLetter" accept="image/*,application/pdf" required></div>
            <div class="form-group"><label>Guarantor Employee ID Front</label><input type="file" id="gempIdFront" accept="image/*" required></div>
        </div>

        <div class="section-title">Employment Information</div>
        <div class="form-grid">
            <div class="form-group"><label>Organization Name</label><input type="text" id="orgName" required></div>
            <div class="form-group"><label>Job Title</label><input type="text" id="jobTitle" required></div>
            <div class="form-group"><label>Gross Salary (ETB)</label><input type="number" id="grossSalary" required></div>
            <div class="form-group"><label>Employment Letter</label><input type="file" id="empLetter" accept="image/*,application/pdf" required></div>
        </div>

        <div class="section-title">Loan Details</div>
        <div class="form-grid">
            <div class="form-group">
                <label>Requested Amount (ETB)</label>
                <input type="number" id="loanAmount" placeholder="Min 500" required min="500" oninput="calculateRepayment()">
            </div>
            <div class="form-group">
                <label>Duration</label>
                <select id="loanDuration" required onchange="calculateRepayment()">
                    <option value="7">7 Days</option>
                    <option value="30">30 Days</option>
                    <option value="60">60 Days</option>
                    <option value="90">90 Days</option>
                </select>
            </div>
        </div>

        <div id="repaymentSummary" style="display: none; margin: 25px 0;">
            <div style="padding: 20px; border: 1px solid #e2e8f0; border-radius: 8px; background: #fff;">
                <div style="display:flex; justify-content:space-between;">
                    <span>Amount You Receive:</span>
                    <span class="net-amount" id="summaryNet">0.00 ETB</span>
                </div>
                <div style="display: flex; justify-content: space-between; font-weight: bold; margin-top: 10px; color: #166534;">
                    <span>Total to Pay Back:</span>
                    <span id="summaryTotal">0.00 ETB</span>
                </div>
                <div id="installmentList" style="margin-top: 10px; font-size: 0.8rem; color: var(--text-muted);"></div>
            </div>
        </div>

        <div class="section-title">Applicant Documents</div>
        <div class="form-grid">
            <div class="form-group"><label>National ID Front</label><input type="file" id="natIdFront" accept="image/*" required></div>
            <div class="form-group"><label>National ID Back</label><input type="file" id="natIdBack" accept="image/*" required></div>
            <div class="form-group"><label>Personal Photo</label><input type="file" id="userPhoto" accept="image/*" required></div>
            <div class="form-group"><label>Digital Signature</label><input type="file" id="digitalSig" accept="image/*" required></div>
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">Submit Loan Application</button>
        <div id="statusMsg" style="margin-top:20px; padding:15px; border-radius:8px; display:none; text-align:center;"></div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script> <script>
    const form = document.getElementById('loanForm');
    const statusMsg = document.getElementById('statusMsg');

    // Helper to get file from input
    const getFile = (id) => {
        const el = document.getElementById(id);
        return (el && el.files) ? el.files[0] : null;
    };

    // Calculation Logic
    function calculateRepayment() {
        const amount = parseFloat(document.getElementById('loanAmount').value);
        const duration = parseInt(document.getElementById('loanDuration').value);
        const summaryBox = document.getElementById('repaymentSummary');
        
        if (isNaN(amount) || amount < 500) {
            summaryBox.style.display = "none";
            return;
        }

        const serviceRate = 0.06;
        const disasterRate = 0.01;
        let insuranceRate = (duration > 30) ? 0.03 : 0;
        
        const valFees = amount * (serviceRate + insuranceRate + disasterRate);
        const netDisbursed = amount - valFees;

        let interestRate = (duration === 60) ? 0.12 : (duration === 90) ? 0.18 : 0;
        const totalRepayable = amount + (amount * interestRate);

        summaryBox.style.display = "block";
        document.getElementById('summaryNet').innerText = netDisbursed.toLocaleString() + " ETB";
        document.getElementById('summaryTotal').innerText = totalRepayable.toLocaleString() + " ETB";
        
        // Simple Installment View
        let instCount = (duration === 60) ? 2 : (duration === 90) ? 3 : 1;
        document.getElementById('installmentList').innerText = `${instCount} Installment(s) of ${(totalRepayable/instCount).toFixed(2)} ETB`;
    }

    // Upload function
    async function uploadDoc(file, folder, userId) {
        if (!file) return null;
        const fileName = `${userId}/${folder}-${Date.now()}.${file.name.split('.').pop()}`;
        const { data, error } = await _supabase.storage
            .from('kyc-docs')
            .upload(fileName, file);
        if (error) throw error;
        return data.path;
    }

    form.onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerText = "Uploading Documents...";

        try {
            const userId = "user_" + Date.now();

            // Parallel Uploads
            const [natF, natB, photo, sig, gLetter, gNatF, gNatB, empL] = await Promise.all([
                uploadDoc(getFile('natIdFront'), 'applicant_id_f', userId),
                uploadDoc(getFile('natIdBack'), 'applicant_id_b', userId),
                uploadDoc(getFile('userPhoto'), 'photo', userId),
                uploadDoc(getFile('digitalSig'), 'signature', userId),
                uploadDoc(getFile('gLetter'), 'guarantor_letter', userId),
                uploadDoc(getFile('gnatIdFront'), 'guarantor_id_f', userId),
                uploadDoc(getFile('gnatIdBack'), 'guarantor_id_b', userId),
                uploadDoc(getFile('empLetter'), 'employment_letter', userId)
            ]);

            // Database Insert
            const { error: dbError } = await _supabase.from('loan_applications').insert([{
                first_name: document.getElementById('firstName').value,
                phone_number: document.getElementById('phoneNumber').value,
                loan_amount: parseFloat(document.getElementById('loanAmount').value),
                loan_duration: document.getElementById('loanDuration').value,
                status: 'pending',
                nat_id_front: natF,
                nat_id_back: natB,
                personal_photo: photo,
                guarantor_name: document.getElementById('gfname').value
            }]);

            if (dbError) throw dbError;

            // Telegram Notification
            const botToken = "8557174379:AAHjA_5WAIxIR8uq4mjZOhd1EfdKvgI2s7o";
            const chatId = "6792892909";
            const msg = `💰 *New Loan Request*\nName: ${document.getElementById('firstName').value}\nAmount: ${document.getElementById('loanAmount').value} ETB\nPhone: ${document.getElementById('phoneNumber').value}`;
            
            await fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`);

            statusMsg.style.display = "block";
            statusMsg.style.backgroundColor = "#dcfce7";
            statusMsg.innerText = "✅ Submitted Successfully!";
            form.reset();

        } catch (err) {
            statusMsg.style.display = "block";
            statusMsg.style.backgroundColor = "#fee2e2";
            statusMsg.innerText = "❌ Error: " + err.message;
        } finally {
            btn.disabled = false;
            btn.innerText = "Submit Loan Application";
        }
    };
</script>
</body>
</html>
