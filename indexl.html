<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comprehensive Amortization Ledger</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div class="container">
        <h2>Loan Calculator & Advanced Ledger</h2>
        
        <form id="loan-form" class="transaction-form">
            <h3>1. Loan Terms Setup</h3>
            <div class="form-group-row">
                <input type="text" id="borrower_name" value="ABC Trading / Project X" placeholder="Borrower Name" required>
                <input type="number" id="loan_amount" value="100000" placeholder="Loan Amount (ETB)" required>
                <input type="date" id="disbursement_date" required>
            </div>
            <div class="form-group-row">
                <input type="number" step="0.1" id="interest_rate" value="12" placeholder="Interest Rate % p.a." required>
                <input type="number" id="loan_term" value="12" placeholder="Term (Months)" required>
                <input type="number" step="0.01" id="total_accrued_estimate" value="25000" placeholder="Initial Accrued Interest (a)" required>
            </div>
            <button type="submit" id="generate-btn">Generate & Sync Complete Schedule</button>
        </form>

        <h3>2. Amortization Ledger</h3>
        <div class="table-responsive">
            <table id="ledger-table">
                <thead>
                    <tr>
                        <th>Month</th>
                        <th>Date</th>
                        <th>Description</th>
                        <th>Ref #</th>
                        <th>Principal (Debit)</th>
                        <th>Interest (Debit)</th>
                        <th>Penalty (Debit)</th>
                        <th>Accrued Int. Receivable</th>
                        <th>Total Paid (Credit)</th>
                        <th>Accrued Unpaid Int.</th>
                        <th>Principal Balance</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    </tbody>
            </table>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
