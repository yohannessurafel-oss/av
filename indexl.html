<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Ledger Project X</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div class="container">
        <h2>Loan Ledger: ABC Trading / Project X</h2>
        
        <form id="ledger-form" class="transaction-form">
            <h3>Add New Transaction</h3>
            <div class="form-group-row">
                <input type="date" id="date" required>
                <input type="text" id="description" placeholder="Description (e.g., Monthly Installment)" required>
                <input type="text" id="ref_number" placeholder="Ref # (e.g., RCPT-042)" required>
            </div>
            <div class="form-group-row">
                <input type="number" step="0.01" id="principal_debit" placeholder="Principal Debit (Optional)">
                <input type="number" step="0.01" id="total_paid" placeholder="Total Paid Credit (Optional)">
                <input type="number" step="0.01" id="principal_balance" placeholder="Current Principal Balance" required>
            </div>
            <button type="submit">Save Transaction</button>
        </form>

        <table id="ledger-table">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Description</th>
                    <th>Ref #</th>
                    <th>Principal (Debit)</th>
                    <th>Total Paid (Credit)</th>
                    <th>Principal Balance</th>
                </tr>
            </thead>
            <tbody id="table-body">
                </tbody>
        </table>
    </div>

    <script src="script.js"></script>
</body>
</html>
