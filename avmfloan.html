<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Africa Village | Admin Dashboard</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.19.3/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --success: #16a34a;
            --danger: #dc2626;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --radius: 12px;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 24px;
        }

        .container { max-width: 1200px; margin: 0 auto; }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }

        .card {
            background: var(--card-bg);
            padding: 24px;
            border-radius: var(--radius);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            border: 1px solid var(--border);
            overflow-x: auto;
        }

        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { padding: 12px; background: #f1f5f9; text-align: left; font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); }
        td { padding: 16px; border-bottom: 1px solid var(--border); font-size: 0.875rem; }

        .status-badge { padding: 4px 12px; border-radius: 9999px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; }
        .pending { background: #fef3c7; color: #92400e; }
        .approved { background: #ecfdf5; color: #065f46; }
        .rejected { background: #fef2f2; color: #991b1b; }

        /* Modal Styles */
        .modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.75); backdrop-filter: blur(4px); z-index: 100; overflow-y: auto; padding: 20px; }
        .modal-content { background: white; max-width: 1000px; margin: 20px auto; padding: 32px; border-radius: var(--radius); position: relative; }
        
        .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 24px; }
        .info-group h4 { margin: 0 0 12px 0; color: var(--primary); border-bottom: 1px solid var(--border); padding-bottom: 5px; font-size: 0.9rem; }
        .info-item { font-size: 0.85rem; margin-bottom: 6px; }
        .info-item span { font-weight: 600; color: var(--text-muted); margin-right: 5px; }

        .doc-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; margin-top: 24px; }
        .doc-item { border: 1px solid var(--border); padding: 12px; border-radius: 8px; background: #fff; text-align: center; }
        .img-container { background: #f1f5f9; height: 140px; border-radius: 4px; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 1px solid var(--border); margin-bottom: 8px; }
        .doc-item img { width: 100%; height: 100%; object-fit: cover; cursor: pointer; }

        .btn { padding: 10px 20px; border-radius: 6px; cursor: pointer; border: none; font-weight: 600; transition: 0.2s; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: var(--danger); color: white; }

        @media print {
            body * { visibility: hidden; }
            #detailsModal, #detailsModal * { visibility: visible; }
            #detailsModal { position: absolute; left: 0; top: 0; width: 100%; }
            .btn, .close-modal, #approvalSection { display: none !important; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Loan Administration</h1>
        <div style="display: flex; gap: 10px;">
            <button onclick="handleLogout()" class="btn" style="background: #64748b; color: white;">Logout</button>
            <button onclick="exportToExcel()" class="btn btn-success">Export Excel</button>
            <button onclick="fetchApplications()" class="btn btn-primary">Refresh List</button>
        </div>
    </div>

    <div class="card">
        <table>
            <thead>
                <tr>
                    <th>Applicant</th>
                    <th>Loan Amount</th>
                    <th>Duration</th>
                    <th>Total Repayable</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="appTableBody">
                <tr><td colspan="6" style="text-align:center">Loading data...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<div id="detailsModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()" style="position:absolute; right:20px; top:20px; font-size:24px; cursor:pointer;">&times;</span>
        
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="margin:0">Review Application</h2>
            <button onclick="window.print()" class="btn btn-danger">Print to PDF</button>
        </div>

        <div id="modalDetails" class="info-grid"></div>
        
        <h3 style="margin-top:32px">Submitted Documents</h3>
        <div class="doc-grid" id="modalDocs"></div>

        <div id="approvalSection" style="margin-top: 30px; padding: 24px; background: #f8fafc; border-radius: 12px; border: 1px solid var(--border);">
            <h3 style="margin-top:0">Approval Workflow</h3>
            
            <div style="display: flex; gap: 20px; align-items: center; margin-bottom: 24px;">
                <button id="btnAdmin1" class="btn" style="flex: 1;">Step 1: Super-Agent</button>
                <div style="font-size: 1.5rem; color: var(--text-muted);">→</div>
                <button id="btnAdmin2" class="btn" style="flex: 1;">Step 2: Manager</button>
            </div>
            
            <div style="border-top: 1px solid var(--border); padding-top: 20px;">
                <textarea id="rejectionReason" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 10px;" rows="2" placeholder="Reason for rejection..."></textarea>
                <button id="btnReject" class="btn btn-danger" style="width: 100%;">Reject Application</button>
            </div>
        </div>
    </div>
</div>

<script>
    let currentApplications = [];
    let loggedInAdmin = null;
    let isProcessing = false;

    // 1. Initialize and Auth Check
    async function initialize() {
        const { data: { user } } = await _supabase.auth.getUser();
        if (!user) return window.location.href = "login.html";

        const { data: profile } = await _supabase
            .from('profiles')
            .select('*')
            .eq('id', user.id)
            .single();

        loggedInAdmin = profile;
        fetchApplications();
    }

    // 2. Fetch Data
    async function fetchApplications() {
        let query = _supabase.from('loan_applications').select('*');
        
        // Filter by branch if restricted
        if (loggedInAdmin.role !== 'manager' && loggedInAdmin.role !== 'super-agent') {
            query = query.eq('nearby_branch', loggedInAdmin.assigned_branch);
        }

        const { data, error } = await query.order('created_at', { ascending: false });
        if (error) return console.error(error);
        
        currentApplications = data || [];
        renderTable();
    }

    // 3. Render Table
    function renderTable() {
        const tbody = document.getElementById('appTableBody');
        tbody.innerHTML = currentApplications.map((app, i) => `
            <tr>
                <td><strong>${app.first_name} ${app.father_name}</strong><br><small>${app.phone_number}</small></td>
                <td>${Number(app.loan_amount).toLocaleString()} ETB</td>
                <td>${app.loan_duration} Days</td>
                <td>${Number(app.total_repayable).toLocaleString()} ETB</td>
                <td><span class="status-badge ${app.status}">${app.status || 'pending'}</span></td>
                <td><button onclick="viewDetails(${i})" class="btn btn-primary">Review</button></td>
            </tr>
        `).join('');
    }

    // 4. View Application Logic
    async function viewDetails(index) {
        const app = currentApplications[index];
        const details = document.getElementById('modalDetails');
        const docs = document.getElementById('modalDocs');

        details.innerHTML = `
            <div class="info-group">
                <h4>Personal Info</h4>
                <div class="info-item"><span>Full Name:</span> ${app.first_name} ${app.father_name}</div>
                <div class="info-item"><span>ID:</span> ${app.national_id_number}</div>
                <div class="info-item"><span>Phone:</span> ${app.phone_number}</div>
            </div>
            <div class="info-group">
                <h4>Loan Details</h4>
                <div class="info-item"><span>Requested:</span> ${Number(app.loan_amount).toLocaleString()} ETB</div>
                <div class="info-item"><span>Repayable:</span> ${Number(app.total_repayable).toLocaleString()} ETB</div>
                <div class="info-item"><span>Branch:</span> ${app.nearby_branch}</div>
            </div>
        `;

        // Load Images
        const docList = [
            { label: 'ID Front', path: app.nat_id_front },
            { label: 'Employment', path: app.employment_letter },
            { label: 'Photo', path: app.personal_photo }
        ];

        docs.innerHTML = '';
        docList.forEach(d => {
            if (!d.path) return;
            const { data } = _supabase.storage.from('kyc-docs').getPublicUrl(d.path);
            docs.innerHTML += `
                <div class="doc-item">
                    <div class="img-container"><img src="${data.publicUrl}" onclick="window.open('${data.publicUrl}')"></div>
                    <small>${d.label}</small>
                </div>`;
        });

        document.getElementById('detailsModal').style.display = "block";
        updateUI(app);
    }

    // 5. Sequential Approval Logic
    function updateUI(app) {
        const b1 = document.getElementById('btnAdmin1');
        const b2 = document.getElementById('btnAdmin2');
        const role = loggedInAdmin.role;

        // Step 1: Super-Agent
        b1.disabled = (role !== 'super-agent') || app.admin_one_status === 'approved' || app.status === 'rejected';
        b1.innerText = app.admin_one_status === 'approved' ? "✅ Step 1 Approved" : "Approve (Super-Agent)";
        b1.className = `btn ${app.admin_one_status === 'approved' ? 'btn-success' : 'btn-primary'}`;
        b1.onclick = () => processApproval(app.id, 1);

        // Step 2: Manager (Only active if Step 1 is done)
        const step1Done = app.admin_one_status === 'approved';
        b2.disabled = (role !== 'manager') || !step1Done || app.admin_two_status === 'approved' || app.status === 'rejected';
        b2.innerText = app.admin_two_status === 'approved' ? "✅ Final Approved" : "Final Approve (Manager)";
        b2.className = `btn ${app.admin_two_status === 'approved' ? 'btn-success' : 'btn-primary'}`;
        b2.onclick = () => processApproval(app.id, 2);

        document.getElementById('btnReject').onclick = () => processRejection(app.id);
    }

    async function processApproval(id, step) {
        if (isProcessing) return;
        isProcessing = true;

        const updateData = step === 1 
            ? { admin_one_status: 'approved', admin_one_approved_by: loggedInAdmin.id } 
            : { admin_two_status: 'approved', admin_two_approved_by: loggedInAdmin.id, status: 'approved' };

        const { error } = await _supabase.from('loan_applications').update(updateData).eq('id', id);
        
        if (!error) {
            alert("Updated successfully");
            fetchApplications();
            closeModal();
        }
        isProcessing = false;
    }

    async function processRejection(id) {
        const reason = document.getElementById('rejectionReason').value;
        if (!reason) return alert("Please enter reason");

        await _supabase.from('loan_applications').update({ status: 'rejected', rejection_reason: reason }).eq('id', id);
        fetchApplications();
        closeModal();
    }

    function closeModal() { document.getElementById('detailsModal').style.display = "none"; }
    function handleLogout() { _supabase.auth.signOut(); window.location.href = "login.html"; }
    
    function exportToExcel() {
        const ws = XLSX.utils.json_to_sheet(currentApplications);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Loans");
        XLSX.writeFile(wb, "Loan_Applications.xlsx");
    }

    initialize();
</script>
</body>
</html>
