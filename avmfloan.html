<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Africa Village | Admin Dashboard</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.19.3/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>

    <style>
        :root { 
            --primary: #2563eb; 
            --bg: #f8fafc; 
            --card-bg: #ffffff;
            --text-main: #0f172a; 
            --text-muted: #64748b;
            --border: #e2e8f0;
            --radius: 12px;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text-main); 
            margin: 0; 
            padding: 24px; 
        }

        .container { max-width: 1200px; margin: 0 auto; }
        
        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 32px; 
        }

        .card { 
            background: var(--card-bg); 
            padding: 24px; 
            border-radius: var(--radius); 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); 
            border: 1px solid var(--border);
            overflow-x: auto;
        }

        table { width: 100%; border-collapse: collapse; }
        th { padding: 12px; background: #f1f5f9; text-align: left; font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); }
        td { padding: 16px; border-bottom: 1px solid var(--border); font-size: 0.875rem; }

        .status-badge { padding: 4px 12px; border-radius: 9999px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; }
        .pending { background: #fef3c7; color: #92400e; }
        .approved { background: #ecfdf5; color: #065f46; }
        .rejected { background: #fef2f2; color: #991b1b; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.75); backdrop-filter: blur(4px); z-index: 100; overflow-y: auto; padding: 20px; }
        .modal-content { background: white; max-width: 1000px; margin: 20px auto; padding: 32px; border-radius: var(--radius); position: relative; }
        
        .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 24px; margin-top: 20px; }
        .info-group h4 { margin: 0 0 12px 0; color: var(--primary); border-bottom: 1px solid var(--border); padding-bottom: 5px; font-size: 0.9rem; }
        .info-item { font-size: 0.85rem; margin-bottom: 6px; }
        .info-item span { font-weight: 600; color: var(--text-muted); margin-right: 5px; }

        .doc-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; margin-top: 24px; }
        .doc-item { border: 1px solid var(--border); padding: 12px; border-radius: 8px; background: #fff; display: flex; flex-direction: column; gap: 8px; }
        .img-container { background: #f1f5f9; height: 140px; border-radius: 4px; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 1px solid var(--border); }
        .doc-item img { width: 100%; height: 100%; object-fit: cover; cursor: zoom-in; }

        .btn { padding: 10px 20px; border-radius: 6px; cursor: pointer; border: none; font-weight: 600; transition: 0.2s; }
        .btn-view { background: var(--primary); color: white; }
        .btn-action { border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        
        .close-modal { position: absolute; right: 24px; top: 24px; cursor: pointer; font-size: 1.5rem; color: var(--text-muted); }

        @media print {
            body * { visibility: hidden; }
            #detailsModal, #detailsModal * { visibility: visible; }
            #detailsModal { position: absolute; left: 0; top: 0; width: 100%; background: white; }
            .btn, .close-modal, #approvalSection, #rejectionReason { display: none !important; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Loan Administration</h1>
        <div style="display: flex; gap: 10px;">
            <button onclick="handleLogout()" class="btn" style="background: #64748b; color: white;">Logout</button>
            <button onclick="exportToExcel()" class="btn" style="background: #16a34a; color: white;">Export Excel</button>
            <button onclick="fetchApplications()" class="btn btn-view">Refresh List</button>
        </div>
    </div>

    <div class="card">
        <table>
            <thead>
                <tr>
                    <th>Applicant</th>
                    <th>Amount (ETB)</th>
                    <th>Duration</th>
                    <th>Repayable</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="appTableBody">
                <tr><td colspan="6" style="text-align:center">Loading loan applications...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<div id="detailsModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="margin:0">Application Review</h2>
            <button onclick="downloadReview()" class="btn" style="background: #ef4444; color: white;">Print / Save PDF</button>
        </div>

        <div id="modalDetails" class="info-grid"></div>
        
        <h3 style="margin-top:32px">Submitted Documents</h3>
        <div class="doc-grid" id="modalDocs"></div>

        <div id="approvalSection" style="margin-top: 30px; padding: 20px; background: #f8fafc; border-radius: 8px; border: 1px solid var(--border);">
            <h3 style="margin-top:0">Administrative Review</h3>
            <div style="display: flex; gap: 20px; align-items: center; margin-bottom: 20px;">
                <button id="btnAdmin1" class="btn" style="background: #2563eb; color: white;">Admin 1 Approve</button>
                <div style="font-size: 1.5rem; color: var(--border);">→</div>
                <button id="btnAdmin2" class="btn" style="background: #2563eb; color: white;">Admin 2 Approve</button>
            </div>
            
            <div style="border-top: 1px solid var(--border); padding-top: 20px;">
                <label style="font-size: 0.8rem; font-weight: bold; color: var(--text-muted);">Rejection Reason:</label>
                <textarea id="rejectionReason" style="width: 100%; margin: 8px 0; padding: 10px; border-radius: 6px; border: 1px solid var(--border);" rows="2" placeholder="Enter reason if rejecting..."></textarea>
                <button id="btnReject" class="btn" style="background: #dc2626; color: white; width: 100%;">Reject Application</button>
            </div>
        </div>
    </div>
</div>

<script>
    let currentApplications = [];
    let loggedInAdmin = null;

    /**
     * Initialize Dashboard: Authenticate user and fetch profile
     */
    async function initializeDashboard() {
        const { data: { user }, error: authError } = await _supabase.auth.getUser();
        if (authError || !user) { 
            window.location.href = "login.html"; 
            return; 
        }

        const { data: profile } = await _supabase.from('profiles').select('role, assigned_branch').eq('id', user.id).single();
        loggedInAdmin = profile;
        fetchApplications();
    }

    /**
     * Fetch Applications based on Admin Role/Branch
     */
    async function fetchApplications() {
        if (!loggedInAdmin) return;
        let query = _supabase.from('loan_applications').select('*');
        
        // Filter by branch if Admin 1
        if (loggedInAdmin.role === 'admin1' && loggedInAdmin.assigned_branch) {
            query = query.eq('nearby_branch', loggedInAdmin.assigned_branch);
        }
        
        const { data, error } = await query.order('created_at', { ascending: false });
        if (error) return alert("Error: " + error.message);
        
        currentApplications = data;
        renderTable();
    }

    /**
     * Render the Application Table
     */
    function renderTable() {
        const tbody = document.getElementById('appTableBody');
        if (currentApplications.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" style="text-align:center">No applications found.</td></tr>';
            return;
        }

        tbody.innerHTML = currentApplications.map((app, i) => `
            <tr>
                <td><strong>${app.first_name} ${app.father_name}</strong><br><small>${app.nearby_branch || 'General'}</small></td>
                <td>${Number(app.loan_amount).toLocaleString()}</td>
                <td>${app.loan_duration} Days</td>
                <td>${Number(app.total_repayable).toLocaleString()}</td>
                <td><span class="status-badge ${app.status}">${app.status}</span></td>
                <td><button onclick="viewDetails(${i})" class="btn btn-view">Review</button></td>
            </tr>
        `).join('');
    }

    /**
     * View Detailed Application & Documents
     */
    async function viewDetails(index) {
        const app = currentApplications[index];
        const detailsContainer = document.getElementById('modalDetails');
        const docsContainer = document.getElementById('modalDocs');

        detailsContainer.innerHTML = `
            <div class="info-group">
                <h4>Personal Information</h4>
                <div class="info-item"><span>Full Name:</span> ${app.first_name} ${app.father_name} ${app.grandfather_name}</div>
                <div class="info-item"><span>Mother's Name:</span> ${app.mother_name}</div>
                <div class="info-item"><span>Phone:</span> ${app.phone_number}</div>
                <div class="info-item"><span>Nationality:</span> ${app.nationality}</div>
                <div class="info-item"><span>ID Num:</span> ${app.national_id_number}</div>
            </div>
            <div class="info-group">
                <h4>Residential Details</h4>
                <div class="info-item"><span>Region:</span> ${app.res_region || 'N/A'}</div>
                <div class="info-item"><span>City:</span> ${app.res_city}</div>
                <div class="info-item"><span>Sub-City:</span> ${app.res_subcity || 'N/A'}</div>
                <div class="info-item"><span>Woreda/House:</span> ${app.res_woreda} / ${app.res_house_num}</div>
                <div class="info-item"><span>Branch:</span> ${app.nearby_branch}</div>
            </div>
            <div class="info-group">
                <h4>Guarantor Info</h4>
                <div class="info-item"><span>Name:</span> ${app.guarantor_name}</div>
                <div class="info-item"><span>Address:</span> ${app.guarantor_address}</div>
                <div class="info-item"><span>Phone:</span> ${app.guarantor_phone}</div>
                <div class="info-item"><span>Guarantor Salary:</span> ${Number(app.guarantor_gross).toLocaleString()} ETB</div>
            </div>
            <div class="info-group">
                <h4>Employment & Loan</h4>
                <div class="info-item"><span>Org:</span> ${app.org_name}</div>
                <div class="info-item"><span>Net Salary:</span> ${Number(app.net_salary).toLocaleString()} ETB</div>
                <div class="info-item"><span>Requested:</span> ${Number(app.loan_amount).toLocaleString()} ETB</div>
                <div class="info-item"><span>Total Repay:</span> ${Number(app.total_repayable).toLocaleString()} ETB</div>
            </div>
        `;

        const docMapping = [
            { label: 'ID Front', path: app.nat_id_front },
            { label: 'ID Back', path: app.nat_id_back },
            { label: 'Employee ID Front', path: app.emp_id_front },
            { label: 'Employee ID Back', path: app.emp_id_back },
            { label: 'Guarantor Letter', path: app.guarantor_letter },
            { label: 'Guarantor ID Front', path: app.g_nat_id_front },
            { label: 'Guarantor ID Back', path: app.g_nat_id_back },
            { label: 'Employment Letter', path: app.employment_letter },
            { label: 'Photo', path: app.personal_photo },
            { label: 'Signature', path: app.digital_signature }
        ];

        docsContainer.innerHTML = ''; 
        docMapping.forEach(doc => {
            if (doc.path) {
                const { data } = _supabase.storage.from('kyc-docs').getPublicUrl(doc.path);
                const publicUrl = data.publicUrl;
                const isPDF = doc.path.toLowerCase().endsWith('.pdf');
                
                const docElement = document.createElement('div');
                docElement.className = 'doc-item';
                docElement.innerHTML = `
                    <div class="img-container">
                        ${isPDF ? `<span>📄 PDF</span>` : `<img src="${publicUrl}" onclick="window.open('${publicUrl}', '_blank')">`}
                    </div>
                    <div style="font-size: 0.7rem; font-weight: bold; text-align:center;">${doc.label}</div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px;">
                        <a href="${publicUrl}" target="_blank" class="btn-action" style="background:#e2e8f0; color:#0f172a; text-decoration:none; padding:5px; font-size:0.6rem; text-align:center; border-radius:4px;">VIEW</a>
                        <button onclick="forceDownload('${publicUrl}', '${doc.label}_${app.first_name}')" class="btn-action" style="background:var(--primary); color:white; padding:5px; font-size:0.6rem; border-radius:4px;">SAVE</button>
                    </div>
                `;
                docsContainer.appendChild(docElement);
            }
        });

        document.getElementById('detailsModal').style.display = "block";
        updateApprovalUI(app);
    }

    /**
     * Approval Logic
     */
    async function approveStep(id, num) {
        const updateData = {};
        const col = num === 1 ? 'admin_one_status' : 'admin_two_status';
        updateData[col] = 'approved';
        
        const app = currentApplications.find(a => a.id === id);
        const otherApproved = (num === 1 ? app.admin_two_status : app.admin_one_status) === 'approved';
        
        // If both admins approved, set final status to approved
        if (otherApproved) updateData.status = 'approved';

        const { error } = await _supabase.from('loan_applications').update(updateData).eq('id', id);
        if (error) alert(error.message);
        else { 
            fetchApplications(); 
            closeModal(); 
        }
    }

    /**
     * Rejection Logic
     */
    async function rejectStep(id) {
        const reason = document.getElementById('rejectionReason').value;
        if (!reason) return alert("Please enter reason.");
        
        const { error } = await _supabase.from('loan_applications').update({ 
            status: 'rejected', 
            rejection_reason: reason 
        }).eq('id', id);
        
        if (error) alert(error.message);
        else { 
            fetchApplications(); 
            closeModal(); 
        }
    }

    /**
     * Manage UI Buttons and Roles
     */
    function updateApprovalUI(app) {
        const b1 = document.getElementById('btnAdmin1');
        const b2 = document.getElementById('btnAdmin2');
        const bReject = document.getElementById('btnReject');

        // Reset onclick events
        b1.onclick = () => approveStep(app.id, 1);
        b2.onclick = () => approveStep(app.id, 2);
        bReject.onclick = () => rejectStep(app.id);

        // Enable/Disable based on roles and current status
        b1.disabled = (loggedInAdmin.role !== 'admin1' && loggedInAdmin.role !== 'superadmin') || app.admin_one_status === 'approved';
        b2.disabled = (loggedInAdmin.role !== 'admin2' && loggedInAdmin.role !== 'superadmin') || app.admin_two_status === 'approved';

        // Update Visuals for Admin 1
        if (app.admin_one_status === 'approved') {
            b1.innerText = "Admin 1 ✅ Approved";
            b1.style.background = "#16a34a";
        } else {
            b1.innerText = "Admin 1 Approve";
            b1.style.background = "#2563eb";
        }

        // Update Visuals for Admin 2
        if (app.admin_two_status === 'approved') {
            b2.innerText = "Admin 2 ✅ Approved";
            b2.style.background = "#16a34a";
        } else {
            b2.innerText = "Admin 2 Approve";
            b2.style.background = "#2563eb";
        }
    }

    /**
     * Helper Functions
     */
    async function handleLogout() { 
        await _supabase.auth.signOut(); 
        window.location.href = "login.html"; 
    }

    function closeModal() { 
        document.getElementById('detailsModal').style.display = "none"; 
    }

    function downloadReview() { 
        window.print(); 
    }

    async function forceDownload(url, fileName) {
        const response = await fetch(url);
        const blob = await response.blob();
        const link = document.createElement('a');
        link.href = window.URL.createObjectURL(blob);
        link.download = fileName.replace(/\s+/g, '_') + '.png';
        link.click();
    }

    function exportToExcel() {
        const worksheet = XLSX.utils.json_to_sheet(currentApplications);
        const workbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(workbook, worksheet, "Loans");
        XLSX.writeFile(workbook, `Loans_${new Date().toLocaleDateString()}.xlsx`);
    }

    // Run on load
    initializeDashboard();
</script>
</body>
</html>
