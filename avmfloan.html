<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Africa Village | Admin Dashboard</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.19.3/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>

    <style>
        :root { 
            --primary: #2563eb; 
            --bg: #f8fafc; 
            --card-bg: #ffffff;
            --text-main: #0f172a; 
            --text-muted: #64748b;
            --border: #e2e8f0;
            --radius: 12px;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text-main); 
            margin: 0; 
            padding: 24px; 
        }

        .container { max-width: 1200px; margin: 0 auto; }
        
        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 32px; 
        }

        .card { 
            background: var(--card-bg); 
            padding: 24px; 
            border-radius: var(--radius); 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); 
            border: 1px solid var(--border);
            overflow-x: auto;
        }

        table { width: 100%; border-collapse: collapse; }
        th { padding: 12px; background: #f1f5f9; text-align: left; font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); }
        td { padding: 16px; border-bottom: 1px solid var(--border); font-size: 0.875rem; }

        .status-badge { padding: 4px 12px; border-radius: 9999px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; }
        .pending { background: #fef3c7; color: #92400e; }
        .approved { background: #ecfdf5; color: #065f46; }
        .rejected { background: #fef2f2; color: #991b1b; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.75); backdrop-filter: blur(4px); z-index: 100; overflow-y: auto; padding: 20px; }
        .modal-content { background: white; max-width: 1000px; margin: 20px auto; padding: 32px; border-radius: var(--radius); position: relative; }
        
        .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 24px; margin-top: 20px; }
        .info-group h4 { margin: 0 0 12px 0; color: var(--primary); border-bottom: 1px solid var(--border); padding-bottom: 5px; font-size: 0.9rem; }
        .info-item { font-size: 0.85rem; margin-bottom: 6px; }
        .info-item span { font-weight: 600; color: var(--text-muted); margin-right: 5px; }

        .doc-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; margin-top: 24px; }
        .doc-item { border: 1px solid var(--border); padding: 12px; border-radius: 8px; background: #fff; display: flex; flex-direction: column; gap: 8px; }
        .img-container { background: #f1f5f9; height: 140px; border-radius: 4px; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 1px solid var(--border); }
        .doc-item img { width: 100%; height: 100%; object-fit: cover; cursor: zoom-in; }

        .btn { padding: 10px 20px; border-radius: 6px; cursor: pointer; border: none; font-weight: 600; transition: 0.2s; }
        .btn-view { background: var(--primary); color: white; }
        .btn-action { border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        
        .close-modal { position: absolute; right: 24px; top: 24px; cursor: pointer; font-size: 1.5rem; color: var(--text-muted); }

        @media print {
            body * { visibility: hidden; }
            #detailsModal, #detailsModal * { visibility: visible; }
            #detailsModal { position: absolute; left: 0; top: 0; width: 100%; background: white; }
            .btn, .close-modal, #approvalSection, #rejectionReason { display: none !important; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Loan Administration</h1>
        <div style="display: flex; gap: 10px;">
            <button onclick="handleLogout()" class="btn" style="background: #64748b; color: white;">Logout</button>
            <button onclick="exportToExcel()" class="btn" style="background: #16a34a; color: white;">Export Excel</button>
            <button onclick="fetchApplications()" class="btn btn-view">Refresh List</button>
        </div>
    </div>

    <div class="card">
        <table>
            <thead>
                <tr>
                    <th>Applicant</th>
                    <th>Amount (ETB)</th>
                    <th>Duration</th>
                    <th>Repayable</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="appTableBody">
                <tr><td colspan="6" style="text-align:center">Loading loan applications...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<div id="detailsModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="margin:0">Application Review</h2>
            <button onclick="downloadReview()" class="btn" style="background: #ef4444; color: white;">Print / Save PDF</button>
        </div>

        <div id="modalDetails" class="info-grid"></div>
        
        <h3 style="margin-top:32px">Submitted Documents</h3>
        <div class="doc-grid" id="modalDocs"></div>

        <div id="approvalSection" style="margin-top: 30px; padding: 20px; background: #f8fafc; border-radius: 8px; border: 1px solid var(--border);">
            <h3 style="margin-top:0">Administrative Review</h3>
            <div style="display: flex; gap: 20px; align-items: center; margin-bottom: 20px;">
                <button id="btnAdmin1" class="btn" style="background: #2563eb; color: white;">Admin 1 Approve</button>
                <div style="font-size: 1.5rem; color: var(--border);">→</div>
                <button id="btnAdmin2" class="btn" style="background: #2563eb; color: white;">Admin 2 Approve</button>
            </div>
            
            <div style="border-top: 1px solid var(--border); padding-top: 20px;">
                <label style="font-size: 0.8rem; font-weight: bold; color: var(--text-muted);">Rejection Reason:</label>
                <textarea id="rejectionReason" style="width: 100%; margin: 8px 0; padding: 10px; border-radius: 6px; border: 1px solid var(--border);" rows="2" placeholder="Enter reason if rejecting..."></textarea>
                <button id="btnReject" class="btn" style="background: #dc2626; color: white; width: 100%;">Reject Application</button>
            </div>
        </div>
    </div>
</div>

<script>
 /**
 * Enhanced Approval & Rejection Logic
 */

// Global loading state helper
let isProcessing = false;

async function approveStep(id, num) {
    if (isProcessing) return;
    isProcessing = true;

    const btn = num === 1 ? document.getElementById('btnAdmin1') : document.getElementById('btnAdmin2');
    const originalText = btn.innerText;
    btn.disabled = true;
    btn.innerText = "Processing...";

    try {
        // 1. Fetch absolute latest state
        const { data: latestApp, error: fetchError } = await _supabase
            .from('loan_applications')
            .select('status, admin_one_status, admin_two_status')
            .eq('id', id)
            .single();

        if (fetchError) throw new Error("Failed to fetch latest status: " + fetchError.message);

        // 2. Enforce sequential approval
        if (num === 2 && latestApp.admin_one_status !== 'approved') {
            throw new Error("Super-Agent must approve first before Manager can approve.");
        }

        // 3. Prepare update
        let updateData = {};
        let actionType = '';

        if (num === 1) {
            if (latestApp.admin_one_status === 'approved') throw new Error("Already approved by Super-Agent.");
            updateData.admin_one_status = 'approved';
            updateData.admin_one_approved_by = loggedInAdmin.id; // assuming profile has .id from user
            actionType = 'admin_one_approve';
        } else {
            if (latestApp.admin_two_status === 'approved') throw new Error("Already approved by Manager.");
            updateData.admin_two_status = 'approved';
            updateData.admin_two_approved_by = loggedInAdmin.id;
            actionType = 'admin_two_approve';
        }

        // 4. Check if this completes the approval
        const willBeFullyApproved = (num === 1 && latestApp.admin_two_status === 'approved') ||
                                   (num === 2 && latestApp.admin_one_status === 'approved');

        if (willBeFullyApproved) {
            updateData.status = 'approved';
        }

        // 5. Perform the update
        const { data: updatedRow, error: updateError } = await _supabase
            .from('loan_applications')
            .update(updateData)
            .eq('id', id)
            .select()
            .single();

        if (updateError) throw updateError;

        // 6. Log the action
        await logApprovalAction({
            application_id: id,
            admin_id: loggedInAdmin.id, // or use the auth user id
            action_type: actionType,
            previous_status: latestApp.status,
            new_status: updatedRow.status || latestApp.status,
        });

        // Success feedback
        if (updatedRow.status === 'approved') {
            alert("🎉 Loan fully approved! Both steps completed.");
        } else {
            alert(`Step ${num} approved successfully. Awaiting the next approver.`);
        }

        await fetchApplications(); // Refresh list
        closeModal();

    } catch (err) {
        console.error(err);
        alert("Error: " + err.message);
    } finally {
        isProcessing = false;
        if (btn) {
            btn.disabled = false;
            btn.innerText = originalText;
        }
    }
}

async function rejectStep(id) {
    if (isProcessing) return;
    const reason = document.getElementById('rejectionReason').value.trim();
    if (!reason) return alert("Please provide a rejection reason.");

    isProcessing = true;
    const btnReject = document.getElementById('btnReject');
    const originalText = btnReject.innerText;
    btnReject.disabled = true;
    btnReject.innerText = "Rejecting...";

    try {
        const { data: latest, error: fetchErr } = await _supabase
            .from('loan_applications')
            .select('status')
            .eq('id', id)
            .single();

        if (fetchErr) throw fetchErr;

        const { error: updateError } = await _supabase
            .from('loan_applications')
            .update({
                status: 'rejected',
                rejection_reason: reason,
                rejected_by: loggedInAdmin.id
            })
            .eq('id', id);

        if (updateError) throw updateError;

        // Log rejection
        await logApprovalAction({
            application_id: id,
            admin_id: loggedInAdmin.id,
            action_type: 'reject',
            previous_status: latest.status,
            new_status: 'rejected',
            rejection_reason: reason
        });

        alert("Application has been rejected.");
        await fetchApplications();
        closeModal();

    } catch (err) {
        alert("Rejection failed: " + err.message);
    } finally {
        isProcessing = false;
        btnReject.disabled = false;
        btnReject.innerText = originalText;
    }
}

// Helper: Log every action
async function logApprovalAction(logData) {
    const { error } = await _supabase
        .from('loan_approval_logs')
        .insert(logData);

    if (error) console.warn("Failed to log approval action:", error.message);
    // Don't block the main flow if logging fails
}

// Updated UI function with better visuals and role enforcement
function updateApprovalUI(app) {
    const b1 = document.getElementById('btnAdmin1');
    const b2 = document.getElementById('btnAdmin2');
    const bReject = document.getElementById('btnReject');

    const isSuperAgent = loggedInAdmin.role === 'super-agent' || loggedInAdmin.role === 'manager'; // adjust as needed
    const isManager = loggedInAdmin.role === 'manager';

    // Button 1 - Super-Agent
    b1.onclick = () => approveStep(app.id, 1);
    b1.disabled = !isSuperAgent || app.admin_one_status === 'approved' || app.status !== 'pending';
    if (app.admin_one_status === 'approved') {
        b1.innerText = "✅ Super-Agent Approved";
        b1.style.background = "#16a34a";
    } else {
        b1.innerText = "Super-Agent Approve (Step 1)";
        b1.style.background = "#2563eb";
    }

    // Button 2 - Manager (only enabled after Step 1)
    b2.onclick = () => approveStep(app.id, 2);
    b2.disabled = !isManager || app.admin_two_status === 'approved' || app.admin_one_status !== 'approved' || app.status !== 'pending';
    if (app.admin_two_status === 'approved') {
        b2.innerText = "✅ Manager Approved";
        b2.style.background = "#16a34a";
    } else {
        b2.innerText = "Manager Approve (Step 2)";
        b2.style.background = "#2563eb";
    }

    // Rejection always available for pending apps
    bReject.onclick = () => rejectStep(app.id);
    bReject.disabled = app.status !== 'pending';
}
</script>
</body>
</html>
