<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Africa Village | Admin Dashboard</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.19.3/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --success: #16a34a;
            --danger: #dc2626;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --radius: 12px;
        }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 24px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }
        .card {
            background: var(--card-bg);
            padding: 24px;
            border-radius: var(--radius);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            border: 1px solid var(--border);
            overflow-x: auto;
        }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th { padding: 12px; background: #f1f5f9; text-align: left; font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); }
        td { padding: 16px; border-bottom: 1px solid var(--border); font-size: 0.875rem; }
        .status-badge { padding: 4px 12px; border-radius: 9999px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; }
        .pending { background: #fef3c7; color: #92400e; }
        .approved { background: #ecfdf5; color: #065f46; }
        .rejected { background: #fef2f2; color: #991b1b; }
       
        .modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.75); backdrop-filter: blur(4px); z-index: 100; overflow-y: auto; padding: 20px; }
        .modal-content { background: white; max-width: 1000px; margin: 20px auto; padding: 32px; border-radius: var(--radius); position: relative; }
       
        .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 24px; margin-top: 20px; }
        .info-group h4 { margin: 0 0 12px 0; color: var(--primary); border-bottom: 1px solid var(--border); padding-bottom: 5px; font-size: 0.9rem; }
        .info-item { font-size: 0.85rem; margin-bottom: 6px; }
        .info-item span { font-weight: 600; color: var(--text-muted); margin-right: 5px; }
       
        .doc-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; margin-top: 24px; }
        .doc-item { border: 1px solid var(--border); padding: 12px; border-radius: 8px; background: #fff; display: flex; flex-direction: column; gap: 8px; }
        .img-container { background: #f1f5f9; height: 140px; border-radius: 4px; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 1px solid var(--border); }
        .doc-item img { width: 100%; height: 100%; object-fit: cover; cursor: zoom-in; }
       
        .btn { padding: 10px 20px; border-radius: 6px; cursor: pointer; border: none; font-weight: 600; transition: 0.2s; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-view { background: var(--primary); color: white; }
        .close-modal { position: absolute; right: 24px; top: 24px; cursor: pointer; font-size: 1.5rem; color: var(--text-muted); }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>Loan Administration</h1>
        <div style="display: flex; gap: 10px;">
            <button onclick="handleLogout()" class="btn" style="background: #64748b; color: white;">Logout</button>
            <button onclick="exportToExcel()" class="btn" style="background: var(--success); color: white;">Export Excel</button>
            <button onclick="fetchApplications()" class="btn btn-view">Refresh List</button>
        </div>
    </div>
    <div class="card">
        <table>
            <thead>
                <tr>
                    <th>Applicant</th>
                    <th>Amount (ETB)</th>
                    <th>Duration</th>
                    <th>Repayable</th>
                    <th>Status</th>
                    <th>Submitted At</th>   <!-- ← Added here -->
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="appTableBody">
                <tr><td colspan="7" style="text-align:center">Loading loan applications...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<div id="detailsModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">&times;</span>
       
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="margin:0">Application Review</h2>
            <button onclick="window.print()" class="btn" style="background: var(--danger); color: white;">Print / Save PDF</button>
        </div>
        <div id="modalDetails" class="info-grid"></div>
       
        <h3 style="margin-top:32px">Submitted Documents</h3>
        <div class="doc-grid" id="modalDocs"></div>
        
        <div id="approvalSection" style="margin-top: 30px; padding: 24px; background: #f8fafc; border-radius: 12px; border: 1px solid var(--border);">
            <h3 style="margin-top:0; font-size: 1.1rem;">Administrative Approval Workflow</h3>
           
            <div style="display: flex; gap: 20px; align-items: center; margin-bottom: 24px; flex-wrap: wrap;">
                <button id="btnAdmin1" class="btn" style="flex: 1; min-width: 200px;">Super-Agent Approve (Step 1)</button>
                <div style="font-size: 1.5rem; color: var(--text-muted); font-weight: bold;">→</div>
                <button id="btnAdmin2" class="btn" style="flex: 1; min-width: 200px;">Manager Approve (Step 2)</button>
            </div>
           
            <div style="border-top: 2px dashed var(--border); padding-top: 20px;">
                <label style="font-size: 0.8rem; font-weight: bold; color: var(--danger);">Rejection Controls:</label>
                <textarea id="rejectionReason" style="width: 100%; margin: 10px 0; padding: 12px; border-radius: 8px; border: 1px solid var(--border); font-family: inherit;" rows="3" placeholder="State clearly why this application is being rejected..."></textarea>
                <button id="btnReject" class="btn" style="background: var(--danger); color: white; width: 100%;">Reject Application</button>
            </div>
        </div>
    </div>
</div>

<script>
    let currentApplications = [];
    let loggedInAdmin = null;
    let isProcessing = false;

    async function initializeDashboard() {
        const { data: { user }, error: authError } = await _supabase.auth.getUser();
        if (authError || !user) {
            window.location.href = "login.html";
            return;
        }
        const { data: profile } = await _supabase
            .from('profiles')
            .select('id, role, assigned_branch')
            .eq('id', user.id)
            .single();
        if (!profile) {
            alert("Profile not found.");
            return;
        }
        loggedInAdmin = profile;
        fetchApplications();
    }

    async function fetchApplications() {
        let query = _supabase.from('loan_applications').select('*');
       
        if (loggedInAdmin.role !== 'manager' && loggedInAdmin.role !== 'super-agent' && loggedInAdmin.assigned_branch) {
            query = query.eq('nearby_branch', loggedInAdmin.assigned_branch);
        }

        const { data, error } = await query.order('created_at', { ascending: false });
        if (error) return console.error(error);
       
        currentApplications = data || [];
        renderTable();
    }

    function renderTable() {
        const tbody = document.getElementById('appTableBody');
        if (currentApplications.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" style="text-align:center">No applications found.</td></tr>';
            return;
        }

        tbody.innerHTML = currentApplications.map((app, i) => {
            // Show submitted_at if exists, otherwise fall back to created_at
            const dateValue = app.submitted_at || app.created_at;
            const submittedTime = dateValue 
                ? new Date(dateValue).toLocaleString('en-ET', {
                    year: 'numeric',
                    month: 'short',
                    day: 'numeric',
                    hour: 'numeric',
                    minute: '2-digit'
                  })
                : 'N/A';

            return `
                <tr>
                    <td><strong>${app.first_name} ${app.father_name}</strong><br><small>${app.phone_number || ''}</small></td>
                    <td>${Number(app.loan_amount || 0).toLocaleString()}</td>
                    <td>${app.loan_duration || 0} Days</td>
                    <td>${Number(app.total_repayable || 0).toLocaleString()}</td>
                    <td><span class="status-badge ${app.status || 'pending'}">${app.status || 'pending'}</span></td>
                    <td><small style="color:#64748b; font-weight:500;">${submittedTime}</small></td>
                    <td><button onclick="viewDetails(${i})" class="btn btn-view">Review</button></td>
                </tr>
            `;
        }).join('');
    }

    // ==================== Your other functions (viewDetails, approveStep, etc.) ====================
    // You can keep your existing ones here. Only renderTable and the table header were updated.

    async function viewDetails(index) {
        const app = currentApplications[index];
        // ... your existing viewDetails code ...
        console.log("Opening details for:", app);
        // Paste your full viewDetails function here if needed
    }

    async function approveStep(id, step) {
        if (isProcessing) return;
        isProcessing = true;
        // ... your existing approveStep logic ...
    }

    async function rejectStep(id) {
        // ... your existing rejectStep logic ...
    }

    function updateApprovalUI(app) {
        // ... your existing updateApprovalUI logic ...
    }

    function closeModal() { 
        document.getElementById('detailsModal').style.display = "none"; 
    }

    async function handleLogout() { 
        await _supabase.auth.signOut(); 
        window.location.href = "login.html"; 
    }

    function exportToExcel() {
        const ws = XLSX.utils.json_to_sheet(currentApplications);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Loans");
        XLSX.writeFile(wb, "Africa_Village_Loans.xlsx");
    }

    // Run on load
    initializeDashboard();
</script>
</body>
</html>
