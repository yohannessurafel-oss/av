<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Africa Village | Admin Dashboard</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.19.3/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --success: #16a34a;
            --danger: #dc2626;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --radius: 12px;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 24px;
        }
        .container { max-width: 1300px; margin: 0 auto; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }
        .card {
            background: var(--card-bg);
            padding: 24px;
            border-radius: var(--radius);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            border: 1px solid var(--border);
            overflow-x: auto;
        }
        table { width: 100%; border-collapse: collapse; min-width: 950px; }
        th { 
            padding: 14px 12px; 
            background: #f1f5f9; 
            text-align: left; 
            font-size: 0.75rem; 
            text-transform: uppercase; 
            color: var(--text-muted);
            font-weight: 600;
        }
        td { 
            padding: 16px 12px; 
            border-bottom: 1px solid var(--border); 
            font-size: 0.875rem; 
        }
        .status-badge { 
            padding: 6px 14px; 
            border-radius: 9999px; 
            font-size: 0.75rem; 
            font-weight: 700; 
            text-transform: uppercase; 
        }
        .pending { background: #fef3c7; color: #92400e; }
        .approved { background: #ecfdf5; color: #065f46; }
        .rejected { background: #fef2f2; color: #991b1b; }

        .modal { 
            display: none; 
            position: fixed; 
            inset: 0; 
            background: rgba(15, 23, 42, 0.75); 
            backdrop-filter: blur(4px); 
            z-index: 100; 
            overflow-y: auto; 
            padding: 20px; 
        }
        .modal-content { 
            background: white; 
            max-width: 1000px; 
            margin: 20px auto; 
            padding: 32px; 
            border-radius: var(--radius); 
            position: relative; 
        }
        .close-modal { 
            position: absolute; 
            right: 24px; 
            top: 24px; 
            cursor: pointer; 
            font-size: 1.8rem; 
            color: var(--text-muted); 
        }
        .btn { 
            padding: 10px 20px; 
            border-radius: 6px; 
            cursor: pointer; 
            border: none; 
            font-weight: 600; 
            transition: 0.2s; 
        }
        .btn-view { background: var(--primary); color: white; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>Loan Administration</h1>
        <div style="display: flex; gap: 10px;">
            <button onclick="handleLogout()" class="btn" style="background: #64748b; color: white;">Logout</button>
            <button onclick="exportToExcel()" class="btn" style="background: #16a34a; color: white;">Export Excel</button>
            <button onclick="fetchApplications()" class="btn btn-view">Refresh List</button>
        </div>
    </div>

    <div class="card">
        <table>
            <thead>
                <tr>
                    <th>Applicant</th>
                    <th>Amount (ETB)</th>
                    <th>Duration</th>
                    <th>Repayable</th>
                    <th>Status</th>
                    <th>Submitted At</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="appTableBody">
                <tr><td colspan="7" style="text-align:center; padding:40px;">Loading loan applications...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<div id="detailsModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">×</span>
       
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="margin:0">Application Review</h2>
            <button onclick="downloadReview()" class="btn" style="background: #ef4444; color: white;">Print / Save PDF</button>
        </div>
        <div id="modalDetails" class="info-grid"></div>
       
        <h3 style="margin-top:32px">Submitted Documents</h3>
        <div class="doc-grid" id="modalDocs"></div>

        <div id="approvalSection" style="margin-top: 30px; padding: 20px; background: #f8fafc; border-radius: 8px; border: 1px solid var(--border);">
            <h3 style="margin-top:0">Administrative Review</h3>
            <div style="display: flex; gap: 20px; align-items: center; margin-bottom: 20px;">
                <button id="btnAdmin1" class="btn" style="background: #2563eb; color: white; flex: 1;">Super-Agent Approve (Step 1)</button>
                <div style="font-size: 1.8rem; color: var(--border);">→</div>
                <button id="btnAdmin2" class="btn" style="background: #2563eb; color: white; flex: 1;">Manager Approve (Step 2)</button>
            </div>
           
            <div style="border-top: 1px solid var(--border); padding-top: 20px;">
                <label style="font-size: 0.8rem; font-weight: bold; color: var(--text-muted);">Rejection Reason:</label>
                <textarea id="rejectionReason" style="width: 100%; margin: 8px 0; padding: 10px; border-radius: 6px; border: 1px solid var(--border);" rows="3" placeholder="Enter detailed reason for rejection..."></textarea>
                <button id="btnReject" class="btn" style="background: #dc2626; color: white; width: 100%; margin-top: 8px;">Reject Application</button>
            </div>
        </div>
    </div>
</div>

<script>
    let currentApplications = [];
    let loggedInAdmin = null;
    let isProcessing = false;

    async function initializeDashboard() {
        const { data: { user }, error: authError } = await _supabase.auth.getUser();
        if (authError || !user) {
            window.location.href = "login.html";
            return;
        }
        const { data: profile } = await _supabase
            .from('profiles')
            .select('id, role, assigned_branch')
            .eq('id', user.id)
            .single();
        if (!profile) {
            alert("Failed to load admin profile.");
            return;
        }
        loggedInAdmin = profile;
        fetchApplications();
    }

    async function fetchApplications() {
        if (!loggedInAdmin) return;

        let query = _supabase.from('loan_applications').select('*');

        if (loggedInAdmin.role !== 'super-agent' && loggedInAdmin.role !== 'manager' && loggedInAdmin.assigned_branch) {
            query = query.eq('nearby_branch', loggedInAdmin.assigned_branch);
        }

        const { data, error } = await query.order('created_at', { ascending: false });
        if (error) return alert("Error fetching applications: " + error.message);

        currentApplications = data || [];
        renderTable();
    }

    function renderTable() {
        const tbody = document.getElementById('appTableBody');
        if (currentApplications.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" style="text-align:center">No applications found.</td></tr>';
            return;
        }

        tbody.innerHTML = currentApplications.map((app, i) => {
            // Use submitted_at if available, otherwise fallback to created_at
            const dateValue = app.submitted_at || app.created_at;
            const submittedTime = dateValue 
                ? new Date(dateValue).toLocaleString('en-ET', {
                    year: 'numeric',
                    month: 'short',
                    day: 'numeric',
                    hour: 'numeric',
                    minute: '2-digit'
                  })
                : 'N/A';

            return `
                <tr>
                    <td><strong>${app.first_name} ${app.father_name}</strong><br><small>${app.nearby_branch || 'General'}</small></td>
                    <td>${Number(app.loan_amount || 0).toLocaleString()}</td>
                    <td>${app.loan_duration || 0} Days</td>
                    <td>${Number(app.total_repayable || 0).toLocaleString()}</td>
                    <td><span class="status-badge ${app.status || 'pending'}">${app.status || 'pending'}</span></td>
                    <td><small style="color:#64748b; font-weight:500;">${submittedTime}</small></td>
                    <td><button onclick="viewDetails(${i})" class="btn btn-view">Review</button></td>
                </tr>
            `;
        }).join('');
    }

    // ==================== Your existing functions (keep them as they are) ====================
    async function viewDetails(index) {
        const app = currentApplications[index];
        if (!app) return;

        const detailsContainer = document.getElementById('modalDetails');
        const docsContainer = document.getElementById('modalDocs');

        detailsContainer.innerHTML = `
            <div class="info-group">
                <h4>Personal Information</h4>
                <div class="info-item"><span>Full Name:</span> ${app.first_name} ${app.father_name} ${app.grandfather_name || ''}</div>
                <div class="info-item"><span>Mother's Name:</span> ${app.mother_name || 'N/A'}</div>
                <div class="info-item"><span>Phone:</span> ${app.phone_number}</div>
                <div class="info-item"><span>Nationality:</span> ${app.nationality}</div>
                <div class="info-item"><span>ID Number:</span> ${app.national_id_number}</div>
            </div>
            <div class="info-group">
                <h4>Residential Details</h4>
                <div class="info-item"><span>Region:</span> ${app.res_region || 'N/A'}</div>
                <div class="info-item"><span>City:</span> ${app.res_city}</div>
                <div class="info-item"><span>Sub-City:</span> ${app.res_subcity || 'N/A'}</div>
                <div class="info-item"><span>Woreda/House:</span> ${app.res_woreda} / ${app.res_house_num}</div>
                <div class="info-item"><span>Branch:</span> ${app.nearby_branch}</div>
            </div>
            <div class="info-group">
                <h4>Guarantor Info</h4>
                <div class="info-item"><span>Name:</span> ${app.guarantor_name}</div>
                <div class="info-item"><span>Address:</span> ${app.guarantor_address}</div>
                <div class="info-item"><span>Phone:</span> ${app.guarantor_phone}</div>
                <div class="info-item"><span>Guarantor Salary:</span> ${Number(app.guarantor_gross || 0).toLocaleString()} ETB</div>
            </div>
            <div class="info-group">
                <h4>Employment & Loan</h4>
                <div class="info-item"><span>Organization:</span> ${app.org_name}</div>
                <div class="info-item"><span>Net Salary:</span> ${Number(app.net_salary || 0).toLocaleString()} ETB</div>
                <div class="info-item"><span>Requested Amount:</span> ${Number(app.loan_amount || 0).toLocaleString()} ETB</div>
                <div class="info-item"><span>Total Repayable:</span> ${Number(app.total_repayable || 0).toLocaleString()} ETB</div>
            </div>
        `;

        // Documents rendering (your existing code)
        const docMapping = [
            { label: 'ID Front', path: app.nat_id_front },
            { label: 'ID Back', path: app.nat_id_back },
            { label: 'Employee ID Front', path: app.emp_id_front },
            { label: 'Employee ID Back', path: app.emp_id_back },
            { label: 'Guarantor Letter', path: app.guarantor_letter },
            { label: 'Guarantor ID Front', path: app.g_nat_id_front },
            { label: 'Guarantor ID Back', path: app.g_nat_id_back },
            { label: 'Employment Letter', path: app.employment_letter },
            { label: 'Personal Photo', path: app.personal_photo },
            { label: 'Digital Signature', path: app.digital_signature }
        ];

        docsContainer.innerHTML = '';
        docMapping.forEach(doc => {
            if (!doc.path) return;
            const { data } = _supabase.storage.from('kyc-docs').getPublicUrl(doc.path);
            const publicUrl = data.publicUrl;
            const isPDF = doc.path.toLowerCase().endsWith('.pdf');

            const docElement = document.createElement('div');
            docElement.className = 'doc-item';
            docElement.innerHTML = `
                <div class="img-container">
                    ${isPDF ? `<span style="font-size:2rem">📄</span>` : `<img src="${publicUrl}" onclick="window.open('${publicUrl}', '_blank')">`}
                </div>
                <div style="font-size: 0.75rem; font-weight: bold; text-align:center;">${doc.label}</div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 6px;">
                    <a href="${publicUrl}" target="_blank" class="btn-action" style="background:#e2e8f0; color:#0f172a; text-decoration:none; padding:6px; font-size:0.65rem; text-align:center; border-radius:4px;">VIEW</a>
                    <button onclick="forceDownload('${publicUrl}', '${doc.label.replace(/\s+/g,'_')}_${app.first_name}')" class="btn-action" style="background:var(--primary); color:white; padding:6px; font-size:0.65rem; border-radius:4px;">SAVE</button>
                </div>
            `;
            docsContainer.appendChild(docElement);
        });

        document.getElementById('detailsModal').style.display = "block";
        updateApprovalUI(app);
    }

    // Paste your full approveStep, rejectStep, logApprovalAction, updateApprovalUI, handleLogout, closeModal, downloadReview, forceDownload, exportToExcel functions here
    // (They are already in your last code - just keep them below this line)

    async function approveStep(id, step) {
        if (isProcessing) return;
        isProcessing = true;
        const btn = step === 1 ? document.getElementById('btnAdmin1') : document.getElementById('btnAdmin2');
        const originalText = btn.innerText;
        btn.disabled = true;
        btn.innerText = "Processing...";

        try {
            // Your full approveStep logic (from previous message)
            console.log(`Approving step ${step} for ID: ${id}`);
            // ... (keep the rest of your approveStep code unchanged)
            await fetchApplications();
            closeModal();
        } catch (err) {
            alert("Approval Error: " + err.message);
        } finally {
            isProcessing = false;
            btn.disabled = false;
            btn.innerText = originalText;
        }
    }

    // ... (add your rejectStep, updateApprovalUI, etc. here - they remain the same as in your last code)

    function closeModal() {
        document.getElementById('detailsModal').style.display = "none";
        document.getElementById('rejectionReason').value = '';
    }

    function downloadReview() {
        window.print();
    }

    async function forceDownload(url, fileName) {
        try {
            const response = await fetch(url);
            const blob = await response.blob();
            const link = document.createElement('a');
            link.href = window.URL.createObjectURL(blob);
            link.download = fileName.replace(/\s+/g, '_') + (url.endsWith('.pdf') ? '.pdf' : '.png');
            link.click();
        } catch (e) {
            alert("Download failed. Please use the VIEW button.");
        }
    }

    function exportToExcel() {
        if (currentApplications.length === 0) return alert("No data to export");
        const worksheet = XLSX.utils.json_to_sheet(currentApplications);
        const workbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(workbook, worksheet, "Loans");
        XLSX.writeFile(workbook, `Loan_Applications_${new Date().toLocaleDateString()}.xlsx`);
    }

    // Run on load
    initializeDashboard();
</script>
</body>
</html>
