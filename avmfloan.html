<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Africa Village | Admin Dashboard</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.19.3/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --success: #16a34a;
            --danger: #dc2626;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --radius: 12px;
        }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 24px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }
        .card {
            background: var(--card-bg);
            padding: 24px;
            border-radius: var(--radius);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            border: 1px solid var(--border);
            overflow-x: auto;
        }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { padding: 12px; background: #f1f5f9; text-align: left; font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); }
        td { padding: 16px; border-bottom: 1px solid var(--border); font-size: 0.875rem; }
        .status-badge { padding: 4px 12px; border-radius: 9999px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; }
        .pending { background: #fef3c7; color: #92400e; }
        .approved { background: #ecfdf5; color: #065f46; }
        .rejected { background: #fef2f2; color: #991b1b; }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.75); backdrop-filter: blur(4px); z-index: 100; overflow-y: auto; padding: 20px; }
        .modal-content { background: white; max-width: 1000px; margin: 20px auto; padding: 32px; border-radius: var(--radius); position: relative; }
        
        .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 24px; margin-top: 20px; }
        .info-group h4 { margin: 0 0 12px 0; color: var(--primary); border-bottom: 1px solid var(--border); padding-bottom: 5px; font-size: 0.9rem; }
        .info-item { font-size: 0.85rem; margin-bottom: 6px; }
        .info-item span { font-weight: 600; color: var(--text-muted); margin-right: 5px; }
        
        .doc-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; margin-top: 24px; }
        .doc-item { border: 1px solid var(--border); padding: 12px; border-radius: 8px; background: #fff; display: flex; flex-direction: column; gap: 8px; }
        .img-container { background: #f1f5f9; height: 140px; border-radius: 4px; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 1px solid var(--border); }
        .doc-item img { width: 100%; height: 100%; object-fit: cover; cursor: zoom-in; }
        
        .btn { padding: 10px 20px; border-radius: 6px; cursor: pointer; border: none; font-weight: 600; transition: 0.2s; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-view { background: var(--primary); color: white; }
        .close-modal { position: absolute; right: 24px; top: 24px; cursor: pointer; font-size: 1.5rem; color: var(--text-muted); }

        @media print {
            body * { visibility: hidden; }
            #detailsModal, #detailsModal * { visibility: visible; }
            #detailsModal { position: absolute; left: 0; top: 0; width: 100%; }
            .btn, .close-modal, #approvalSection { display: none !important; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Loan Administration</h1>
        <div style="display: flex; gap: 10px;">
            <button onclick="handleLogout()" class="btn" style="background: #64748b; color: white;">Logout</button>
            <button onclick="exportToExcel()" class="btn" style="background: var(--success); color: white;">Export Excel</button>
            <button onclick="fetchApplications()" class="btn btn-view">Refresh List</button>
        </div>
    </div>

    <div class="card">
        <table>
            <thead>
                <tr>
                    <th>Applicant</th>
                    <th>Amount (ETB)</th>
                    <th>Duration</th>
                    <th>Repayable</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="appTableBody">
                <tr><td colspan="6" style="text-align:center">Loading loan applications...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<div id="detailsModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="margin:0">Application Review</h2>
            <button onclick="window.print()" class="btn" style="background: var(--danger); color: white;">Print / Save PDF</button>
        </div>

        <div id="modalDetails" class="info-grid"></div>
        
        <h3 style="margin-top:32px">Submitted Documents</h3>
        <div class="doc-grid" id="modalDocs"></div>

        <div id="approvalSection" style="margin-top: 30px; padding: 24px; background: #f8fafc; border-radius: 12px; border: 1px solid var(--border);">
            <h3 style="margin-top:0; font-size: 1.1rem;">Administrative Approval Workflow</h3>
            
            <div style="display: flex; gap: 20px; align-items: center; margin-bottom: 24px; flex-wrap: wrap;">
                <button id="btnAdmin1" class="btn" style="flex: 1; min-width: 200px;">Super-Agent Approve (Step 1)</button>
                <div style="font-size: 1.5rem; color: var(--text-muted); font-weight: bold;">→</div>
                <button id="btnAdmin2" class="btn" style="flex: 1; min-width: 200px;">Manager Approve (Step 2)</button>
            </div>
            
            <div style="border-top: 2px dashed var(--border); padding-top: 20px;">
                <label style="font-size: 0.8rem; font-weight: bold; color: var(--danger);">Rejection Controls:</label>
                <textarea id="rejectionReason" style="width: 100%; margin: 10px 0; padding: 12px; border-radius: 8px; border: 1px solid var(--border); font-family: inherit;" rows="3" placeholder="State clearly why this application is being rejected..."></textarea>
                <button id="btnReject" class="btn" style="background: var(--danger); color: white; width: 100%;">Reject Application</button>
            </div>
        </div>
    </div>
</div>

<script>
    let currentApplications = [];
    let loggedInAdmin = null;
    let isProcessing = false;

    async function initializeDashboard() {
        const { data: { user }, error: authError } = await _supabase.auth.getUser();
        if (authError || !user) {
            window.location.href = "login.html";
            return;
        }

        const { data: profile } = await _supabase
            .from('profiles')
            .select('id, role, assigned_branch')
            .eq('id', user.id)
            .single();

        if (!profile) {
            alert("Profile not found. Contact system admin.");
            return;
        }

        loggedInAdmin = profile;
        fetchApplications();
    }

    async function fetchApplications() {
        let query = _supabase.from('loan_applications').select('*');
        
        // Filter by branch if not a top-level manager
        if (loggedInAdmin.role !== 'manager' && loggedInAdmin.role !== 'super-agent' && loggedInAdmin.assigned_branch) {
            query = query.eq('nearby_branch', loggedInAdmin.assigned_branch);
        }

        const { data, error } = await query.order('created_at', { ascending: false });
        if (error) return console.error(error);
        
        currentApplications = data || [];
        renderTable();
    }

    function renderTable() {
        const tbody = document.getElementById('appTableBody');
        if (currentApplications.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" style="text-align:center">No pending applications.</td></tr>';
            return;
        }

        tbody.innerHTML = currentApplications.map((app, i) => `
            <tr>
                <td><strong>${app.first_name} ${app.father_name}</strong><br><small>${app.phone_number}</small></td>
                <td>${Number(app.loan_amount).toLocaleString()}</td>
                <td>${app.loan_duration} Days</td>
                <td>${Number(app.total_repayable).toLocaleString()}</td>
                <td><span class="status-badge ${app.status || 'pending'}">${app.status || 'pending'}</span></td>
                <td><button onclick="viewDetails(${i})" class="btn btn-view">Review</button></td>
            </tr>
        `).join('');
    }

    async function viewDetails(index) {
        const app = currentApplications[index];
        const detailsContainer = document.getElementById('modalDetails');
        const docsContainer = document.getElementById('modalDocs');

        detailsContainer.innerHTML = `
            <div class="info-group">
                <h4>Applicant Details</h4>
                <div class="info-item"><span>Full Name:</span> ${app.first_name} ${app.father_name}</div>
                <div class="info-item"><span>Branch:</span> ${app.nearby_branch}</div>
                <div class="info-item"><span>ID Number:</span> ${app.national_id_number}</div>
            </div>
            <div class="info-group">
                <h4>Financials</h4>
                <div class="info-item"><span>Loan Amount:</span> ${Number(app.loan_amount).toLocaleString()} ETB</div>
                <div class="info-item"><span>Net Disbursed:</span> ${Number(app.net_disbursed).toLocaleString()} ETB</div>
                <div class="info-item"><span>Repayable:</span> ${Number(app.total_repayable).toLocaleString()} ETB</div>
            </div>
        `;

        // Render documents
        const docs = [
            { label: 'ID Front', path: app.nat_id_front },
            { label: 'ID Back', path: app.nat_id_back },
            { label: 'User Photo', path: app.personal_photo },
            { label: 'Employment Letter', path: app.employment_letter },
            { label: 'Signature', path: app.digital_signature }
        ];

        docsContainer.innerHTML = '';
        docs.forEach(doc => {
            if (!doc.path) return;
            const { data } = _supabase.storage.from('kyc-docs').getPublicUrl(doc.path);
            docsContainer.innerHTML += `
                <div class="doc-item">
                    <div class="img-container">
                        <img src="${data.publicUrl}" onclick="window.open('${data.publicUrl}')">
                    </div>
                    <div style="font-size:0.7rem; font-weight:bold; text-align:center">${doc.label}</div>
                    <a href="${data.publicUrl}" target="_blank" class="btn" style="font-size:0.6rem; text-align:center; background:#eee; color:#333; text-decoration:none;">DOWNLOAD</a>
                </div>
            `;
        });

        document.getElementById('detailsModal').style.display = "block";
        updateApprovalUI(app);
    }

    async function approveStep(id, step) {
        if (isProcessing) return;
        isProcessing = true;

        const btn = document.getElementById(step === 1 ? 'btnAdmin1' : 'btnAdmin2');
        btn.innerText = "Processing...";

        try {
            const updateData = {};
            if (step === 1) {
                updateData.admin_one_status = 'approved';
                updateData.admin_one_approved_by = loggedInAdmin.id;
            } else {
                updateData.admin_two_status = 'approved';
                updateData.admin_two_approved_by = loggedInAdmin.id;
                updateData.status = 'approved'; // Finalize
            }

            const { error } = await _supabase.from('loan_applications').update(updateData).eq('id', id);
            if (error) throw error;

            await _supabase.from('loan_approval_logs').insert({
                application_id: id,
                admin_id: loggedInAdmin.id,
                action_type: step === 1 ? 'admin_one_approve' : 'admin_two_approve'
            });

            alert(`Step ${step} completed successfully.`);
            fetchApplications();
            closeModal();
        } catch (err) {
            alert(err.message);
        } finally {
            isProcessing = false;
        }
    }

    async function rejectStep(id) {
        const reason = document.getElementById('rejectionReason').value;
        if (!reason) return alert("Please provide a reason.");

        const { error } = await _supabase.from('loan_applications').update({
            status: 'rejected',
            rejection_reason: reason
        }).eq('id', id);

        if (!error) {
            alert("Application rejected.");
            fetchApplications();
            closeModal();
        }
    }

    function updateApprovalUI(app) {
        const b1 = document.getElementById('btnAdmin1');
        const b2 = document.getElementById('btnAdmin2');
        const isSuper = loggedInAdmin.role === 'super-agent';
        const isManager = loggedInAdmin.role === 'manager';

        // Admin 1 Logic
        b1.disabled = !isSuper || app.admin_one_status === 'approved' || app.status === 'rejected';
        b1.innerText = app.admin_one_status === 'approved' ? "✅ Step 1 Done" : "Approve Step 1 (Super-Agent)";
        b1.style.background = app.admin_one_status === 'approved' ? "var(--success)" : "var(--primary)";
        b1.style.color = "white";
        b1.onclick = () => approveStep(app.id, 1);

        // Admin 2 Logic (Depends on Admin 1)
        b2.disabled = !isManager || app.admin_one_status !== 'approved' || app.admin_two_status === 'approved' || app.status === 'rejected';
        b2.innerText = app.admin_two_status === 'approved' ? "✅ Final Approval Done" : "Approve Step 2 (Manager)";
        b2.style.background = app.admin_two_status === 'approved' ? "var(--success)" : "var(--primary)";
        b2.style.color = "white";
        b2.onclick = () => approveStep(app.id, 2);

        document.getElementById('btnReject').onclick = () => rejectStep(app.id);
    }

    function closeModal() { document.getElementById('detailsModal').style.display = "none"; }
    async function handleLogout() { await _supabase.auth.signOut(); window.location.href = "login.html"; }

    function exportToExcel() {
        const ws = XLSX.utils.json_to_sheet(currentApplications);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Loans");
        XLSX.writeFile(wb, "Africa_Village_Loans.xlsx");
    }

    initializeDashboard();
</script>
</body>
</html>
